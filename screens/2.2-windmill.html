<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2.2 - Windmolen | Weather Lab Kids</title>
    <link rel="stylesheet" href="../design-system.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        .weather-screen { width:100%; height:100vh; height:100dvh; background:linear-gradient(135deg,#87CEEB 0%,#E0F7FA 100%); position:relative; overflow-x:hidden; overflow-y:auto; font-family:var(--font-modern); display:flex; align-items:center; justify-content:center; }
        .soft-cloud { position:fixed; background:rgba(255,255,255,0.5); backdrop-filter:blur(8px); border-radius:100px; animation:float-cloud linear infinite; box-shadow:0 10px 30px rgba(0,0,0,0.05); pointer-events:none; }
        .soft-cloud::before,.soft-cloud::after { content:''; position:absolute; background:inherit; border-radius:50%; }
        .soft-cloud::before { width:50%; height:100%; top:-40%; left:15%; }
        .soft-cloud::after { width:40%; height:80%; top:-20%; right:15%; }
        .cloud-1{width:min(200px,25vw);height:min(60px,7.5vw);top:10%;animation-duration:45s;} .cloud-2{width:min(150px,20vw);height:min(45px,5.5vw);top:25%;animation-duration:60s;animation-delay:-10s;} .cloud-3{width:min(250px,30vw);height:min(75px,9vw);top:80%;animation-duration:50s;animation-delay:-25s;}
        @keyframes float-cloud{0%{transform:translateX(-300px);}100%{transform:translateX(calc(100vw + 300px));}}
        .weather-panel { background:rgba(255,255,255,0.7); backdrop-filter:blur(20px); border:2px solid rgba(255,255,255,0.5); padding:clamp(25px,4vw,50px); width:min(850px,92vw); border-radius:clamp(20px,4vw,40px); box-shadow:0 40px 100px rgba(0,0,0,0.1); text-align:center; z-index:10; max-height:90vh; overflow-y:auto; }
        .weather-header { margin-bottom:clamp(20px,3vw,40px); }
        .weather-title { font-size:clamp(12px,1.5vw,16px); font-weight:900; color:var(--text-muted); text-transform:uppercase; letter-spacing:2px; margin-bottom:10px; }
        .weather-date { font-size:clamp(22px,4vw,36px); font-weight:900; color:var(--text-dark); }
        .weather-main { display:flex; align-items:center; justify-content:center; gap:clamp(15px,3vw,40px); margin-bottom:clamp(20px,3vw,40px); padding:clamp(15px,2.5vw,30px); background:rgba(255,255,255,0.4); border-radius:30px; flex-wrap:wrap; }
        .main-temp { font-size:clamp(48px,10vw,96px); font-weight:900; color:var(--text-dark); line-height:1; }
        .main-info { text-align:left; }
        .main-condition { font-size:clamp(18px,3.5vw,32px); font-weight:900; color:#3498DB; text-transform:uppercase; }
        .main-icon { font-size:clamp(50px,10vw,100px); filter:drop-shadow(0 10px 20px rgba(0,0,0,0.1)); }
        .weather-grid { display:grid; grid-template-columns:1fr; gap:clamp(10px,2vw,20px); margin-bottom:clamp(20px,3vw,40px); }
        .weather-card { background:white; padding:clamp(15px,2.5vw,25px) clamp(20px,3vw,40px); border-radius:24px; box-shadow:0 10px 20px var(--shadow-soft); display:flex; align-items:center; gap:clamp(12px,2vw,25px); transition:transform 0.3s; }
        .weather-card:hover { transform:translateY(-3px); }
        .card-icon { font-size:clamp(24px,4vw,40px); filter:drop-shadow(0 5px 10px rgba(0,0,0,0.05)); }
        .card-content { text-align:left; }
        .card-label { font-size:clamp(10px,1.2vw,14px); font-weight:900; color:#BDC3C7; text-transform:uppercase; letter-spacing:1px; }
        .card-value { font-size:clamp(16px,3vw,28px); font-weight:900; color:var(--text-dark); }
        .weather-summary { background:rgba(255,217,102,0.2); border:2px solid var(--sun-glow); padding:clamp(15px,2.5vw,25px) clamp(20px,3vw,40px); border-radius:24px; margin-bottom:clamp(20px,3vw,40px); display:flex; align-items:center; gap:clamp(10px,2vw,20px); text-align:left; }
        .summary-icon { font-size:clamp(24px,4vw,40px); }
        .summary-text { font-size:clamp(13px,1.8vw,18px); color:var(--text-dark); line-height:1.6; font-weight:700; }
        .btn-confirm { width:100%; padding:clamp(15px,2.5vw,25px); font-family:var(--font-modern); font-size:clamp(16px,2.5vw,22px); font-weight:900; background:var(--sun-yellow); color:var(--text-dark); border:none; border-radius:40px; cursor:pointer; box-shadow:0 15px 30px var(--sun-glow); transition:all 0.3s cubic-bezier(0.175,0.885,0.32,1.275); text-transform:uppercase; letter-spacing:1px; }
        .btn-confirm:hover { transform:scale(1.03) translateY(-5px); background:#FFE082; }
        .btn-back { position:fixed; top:clamp(15px,3vw,40px); left:clamp(15px,3vw,40px); background:rgba(255,255,255,0.4); backdrop-filter:blur(10px); border:2px solid rgba(255,255,255,0.5); color:#2C3E50; padding:clamp(10px,1.5vw,15px) clamp(15px,2.5vw,30px); border-radius:30px; font-weight:700; z-index:100; cursor:pointer; transition:all 0.3s; font-size:clamp(12px,1.5vw,16px); }
        .btn-back:hover { background:white; transform:translateX(-5px); }
    </style>
</head>
<body>
    <div class="screen-container weather-screen">
        <div class="soft-cloud cloud-1"></div><div class="soft-cloud cloud-2"></div><div class="soft-cloud cloud-3"></div>
        <button class="btn-back" onclick="history.back()">← TERUG</button>
        <div class="weather-panel">
            <div class="weather-header"><div class="weather-title">HET WEER VAN VANDAAG</div><div class="weather-date" id="currentDate">ZONDAG 29 MAART</div></div>
            <div class="weather-main"><div class="main-icon">☀️</div><div class="main-info"><div class="main-temp">18°C</div><div class="main-condition">Zonnig</div></div></div>
            <div class="weather-grid"><div class="weather-card"><div class="card-icon">💨</div><div class="card-content"><div class="card-label">Windkracht & Richting</div><div class="card-value">15 km/u • Noordwest</div></div></div></div>
            <div class="weather-summary"><div class="summary-icon">✨</div><div class="summary-text">Het is een prachtige dag! De wind komt uit het noordwesten en brengt frisse lucht. Een perfecte dag om buiten de wolken te bestuderen! 😎</div></div>
            <button class="btn-confirm" onclick="history.back()">BEGREPEN! →</button>
        </div>
    </div>
    <script>
        window.onload=function(){const options={weekday:'long',day:'numeric',month:'long'};const today=new Date().toLocaleDateString('nl-NL',options).toUpperCase();document.getElementById('currentDate').textContent=today;};
    </script>
</body>
</html>
