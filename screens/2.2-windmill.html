<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>2.2 - Windmolen | Weather Lab Kids</title>
    <link rel="stylesheet" href="../design-system.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        .weather-screen {
            width: var(--screen-width);
            height: var(--screen-height);
            background: linear-gradient(135deg, #87CEEB 0%, #E0F7FA 100%);
            position: relative;
            overflow: hidden;
            font-family: var(--font-modern);
        }

        /* Modern Weather Panel - Glassmorphism */
        .weather-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            padding: 50px;
            width: 850px;
            border-radius: 40px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.1);
            text-align: center;
            z-index: 10;
        }

        .weather-header {
            margin-bottom: 40px;
        }

        .weather-title {
            font-size: 16px;
            font-weight: 900;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .weather-date {
            font-size: 36px;
            font-weight: 900;
            color: var(--text-dark);
        }

        /* Main Temperature Focus */
        .weather-main {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            margin-bottom: 40px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 30px;
        }

        .main-temp {
            font-size: 96px;
            font-weight: 900;
            color: var(--text-dark);
            line-height: 1;
        }

        .main-info {
            text-align: left;
        }

        .main-condition {
            font-size: 32px;
            font-weight: 900;
            color: #3498DB;
            text-transform: uppercase;
        }

        .main-icon {
            font-size: 100px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));
        }

        /* Weather Details Grid */
        .weather-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .weather-card {
            background: white;
            padding: 25px 40px;
            border-radius: 24px;
            box-shadow: 0 10px 20px var(--shadow-soft);
            display: flex;
            align-items: center;
            gap: 25px;
            transition: transform 0.3s;
        }

        .weather-card:hover {
            transform: translateY(-3px);
        }

        .card-icon {
            font-size: 40px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.05));
        }

        .card-content {
            text-align: left;
        }

        .card-label {
            font-size: 14px;
            font-weight: 900;
            color: #BDC3C7;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-value {
            font-size: 28px;
            font-weight: 900;
            color: var(--text-dark);
        }

        /* Weather Explanation */
        .weather-summary {
            background: rgba(255, 217, 102, 0.2);
            border: 2px solid var(--sun-glow);
            padding: 25px 40px;
            border-radius: 24px;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 20px;
            text-align: left;
        }

        .summary-icon {
            font-size: 40px;
        }

        .summary-text {
            font-size: 18px;
            color: var(--text-dark);
            line-height: 1.6;
            font-weight: 700;
        }

        /* Modern Button */
        .btn-confirm {
            width: 100%;
            padding: 25px;
            font-family: var(--font-modern);
            font-size: 22px;
            font-weight: 900;
            background: var(--sun-yellow);
            color: var(--text-dark);
            border: none;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 15px 30px var(--sun-glow);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-confirm:hover {
            transform: scale(1.03) translateY(-5px);
            background: #FFE082;
            box-shadow: 0 20px 40px var(--sun-glow);
        }

        /* Modern Soft Clouds */
        .soft-cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 100px;
            animation: float-cloud linear infinite;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            pointer-events: none;
        }

        .soft-cloud::before, .soft-cloud::after {
            content: '';
            position: absolute;
            background: inherit;
            border-radius: 50%;
        }

        .soft-cloud::before { width: 50%; height: 100%; top: -40%; left: 15%; }
        .soft-cloud::after { width: 40%; height: 80%; top: -20%; right: 15%; }

        @keyframes float-cloud {
            0% { transform: translateX(-300px); }
            100% { transform: translateX(1300px); }
        }

        /* Back Button Override */
        .btn-back {
            position: absolute;
            top: 40px;
            left: 40px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: #2C3E50;
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: 700;
            z-index: 100;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-back:hover {
            background: white;
            transform: translateX(-5px);
        }
    </style>
</head>
<body>
    <div class="screen-container weather-screen">
        <!-- Modern Clouds -->
        <div class="soft-cloud" style="width: 200px; height: 60px; top: 10%; left: -200px; animation-duration: 45s;"></div>
        <div class="soft-cloud" style="width: 150px; height: 45px; top: 25%; left: -150px; animation-duration: 60s; animation-delay: -10s;"></div>
        <div class="soft-cloud" style="width: 250px; height: 75px; top: 80%; left: -300px; animation-duration: 50s; animation-delay: -25s;"></div>

        <button class="btn-back" onclick="history.back()">← TERUG</button>
        
        <div class="weather-panel">
            <div class="weather-header">
                <div class="weather-title">HET WEER VAN VANDAAG</div>
                <div class="weather-date" id="currentDate">ZONDAG 29 MAART</div>
            </div>

            <!-- Main Focus: Temperature & Condition -->
            <div class="weather-main">
                <div class="main-icon">☀️</div>
                <div class="main-info">
                    <div class="main-temp">18°C</div>
                    <div class="main-condition">Zonnig</div>
                </div>
            </div>

            <div class="weather-grid">
                <!-- Wind Card -->
                <div class="weather-card">
                    <div class="card-icon">💨</div>
                    <div class="card-content">
                        <div class="card-label">Windkracht & Richting</div>
                        <div class="card-value">15 km/u • Noordwest</div>
                    </div>
                </div>
            </div>

            <!-- Weather Summary -->
            <div class="weather-summary">
                <div class="summary-icon">✨</div>
                <div class="summary-text">
                    Het is een prachtige dag! De wind komt uit het noordwesten en brengt frisse lucht. 
                    Een perfecte dag om buiten de wolken te bestuderen! 😎
                </div>
            </div>

            <button class="btn-confirm" onclick="history.back()">
                BEGREPEN! →
            </button>
        </div>
    </div>

    <script>
        // Set today's date in Dutch
        window.onload = function() {
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            const today = new Date().toLocaleDateString('nl-NL', options).toUpperCase();
            document.getElementById('currentDate').textContent = today;
        };
    </script>
</body>
</html>
