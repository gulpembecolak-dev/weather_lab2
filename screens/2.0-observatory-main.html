<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2.0 - Observatorium | Weather Lab Kids</title>
    <link rel="stylesheet" href="../design-system.css">
    <style>
        .observatory-screen {
            width: var(--screen-width);
            height: var(--screen-height);
            background: #5D4037; /* Warm wood color */
            position: relative;
            overflow: hidden;
        }

        /* Room Construction */
        .room-floor {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 180px;
            background: #3E2723;
            border-top: 8px solid #2D1B18;
            z-index: 5;
        }

        .room-wall {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #6D4C41 0%, #4E342E 100%);
            box-shadow: inset 0 0 100px rgba(0,0,0,0.5);
        }

        /* Decorative Background Props */
        .shelf {
            position: absolute;
            background: #3E2723;
            border: 4px solid var(--wood-dark);
            height: 15px;
            box-shadow: 0 10px 0 rgba(0,0,0,0.2);
        }

        .prop-item {
            position: absolute;
            font-size: 40px;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.3));
        }

        /* World Map on wall */
        .world-map-frame {
            position: absolute;
            top: 80px; right: 80px;
            width: 320px; height: 200px;
            background: #E59866;
            border: 10px solid var(--wood-dark);
            box-shadow: 
                inset 0 0 0 4px var(--wood-light),
                0 15px 30px rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center;
            font-size: 100px;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .world-map-frame:hover {
            transform: scale(1.05);
        }

        /* Window view */
        .observatory-window {
            position: absolute;
            top: 60px; left: 300px;
            width: 250px; height: 250px;
            background: #87CEEB;
            border: 12px solid var(--wood-dark);
            border-radius: 50% 50% 0 0;
            overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.3);
        }

        /* Instruments */
        .instrument-container {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            z-index: 10;
            transition: transform 0.2s;
        }

        .instrument-container:hover {
            transform: scale(1.1);
        }

        .instrument-label {
            margin-top: 15px;
            background: var(--parchment);
            border: 3px solid var(--wood-dark);
            padding: 8px 15px;
            font-size: 12px;
            color: var(--text-dark);
            border-radius: 4px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        /* Desk Area */
        .scientist-desk {
            position: absolute;
            bottom: 60px; left: 50px;
            width: 450px; height: 160px;
            background: #5D4037;
            border: 8px solid var(--wood-dark);
            box-shadow: 
                inset 0 0 0 4px var(--wood-light),
                0 20px 40px rgba(0,0,0,0.5);
            z-index: 6;
        }

        /* Progress Display */
        .mission-status {
            position: absolute;
            top: 30px; left: 50%;
            transform: translateX(-50%);
            background: var(--parchment);
            border: 4px solid var(--wood-dark);
            padding: 15px 40px;
            border-radius: 40px;
            font-size: 14px;
            color: var(--text-dark);
            z-index: 100;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="screen-container observatory-screen">
        <div class="room-wall"></div>
        <div class="room-floor"></div>

        <!-- Back Button -->
        <button class="btn-pixel btn-wood btn-back" onclick="window.location.href='1.0-hub-map.html'">
            ← EILANDEN
        </button>

        <!-- Mission Status -->
        <div class="mission-status">
            MISSIE: Meet het Weer (<span id="progressCount">0</span>/3)
        </div>

        <!-- Shelves & Props -->
        <div class="shelf" style="top: 150px; left: 50px; width: 200px;"></div>
        <div class="prop-item" style="top: 100px; left: 70px;">🧪</div>
        <div class="prop-item" style="top: 100px; left: 130px;">📚</div>

        <div class="shelf" style="top: 350px; right: 50px; width: 180px;"></div>
        <div class="prop-item" style="top: 300px; right: 70px;">🏺</div>
        <div class="prop-item" style="top: 300px; right: 130px;">🕯️</div>

        <!-- World Map -->
        <div class="world-map-frame" onclick="navigateTo('2.3-interactive-map.html')">
            🗺️
            <div style="position:absolute; bottom: -40px; font-size: 12px; color: var(--parchment);">WEERKAART</div>
        </div>

        <!-- Window with view -->
        <div class="observatory-window">
            <div style="position:absolute; bottom: 20px; left: 50%; transform: translateX(-50%); font-size: 60px;">🌤️</div>
        </div>

        <!-- Desk with props -->
        <div class="scientist-desk">
            <div class="prop-item" style="top: -60px; left: 40px; font-size: 60px;">🔬</div>
            <div class="prop-item" style="top: -50px; left: 150px; font-size: 50px;">📝</div>
            <div class="prop-item" style="top: -55px; left: 250px; font-size: 55px;">☕</div>
        </div>

        <!-- Main Instruments -->
        <!-- 1. Thermometer -->
        <div class="instrument-container" style="bottom: 150px; right: 450px;" onclick="navigateTo('2.1-thermometer.html')" id="inst-thermometer">
            <div style="font-size: 100px;">🌡️</div>
            <div class="instrument-label">THERMOMETER</div>
        </div>

        <!-- 2. Windmill/Anemometer -->
        <div class="instrument-container" style="bottom: 120px; right: 150px;" onclick="navigateTo('2.2-windmill.html')" id="inst-windmill">
            <div style="font-size: 110px;">🎡</div>
            <div class="instrument-label">WINDMOLEN</div>
        </div>

        <!-- 3. Rain Gauge (Placeholder for now) -->
        <div class="instrument-container" style="bottom: 180px; left: 100px; z-index: 20;" onclick="showDialogue('Dit is de regenmeter! Momenteel is het droog.', 'happy')">
            <div style="font-size: 80px;">🏺</div>
            <div class="instrument-label">REGENMETER</div>
        </div>
    </div>

    <script>
        window.onload = function() {
            // Update progress
            const obsDone = [
                sessionStorage.getItem('completed_thermometer'),
                sessionStorage.getItem('completed_windmill'),
                sessionStorage.getItem('completed_weather_map')
            ].filter(v => v === 'true').length;

            document.getElementById('progressCount').textContent = obsDone;

            // Show welcome
            setTimeout(() => {
                showDialogue("Welkom in het Observatorium! Hier meten we het weer. Klik op de instrumenten om te beginnen!", "happy");
            }, 1000);
        };

        function navigateTo(url) {
            window.location.href = url;
        }
    </script>
</body>
</html>
