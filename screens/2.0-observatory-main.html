<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2.0 - Observatorium | Weather Lab Kids</title>
    <link rel="stylesheet" href="../design-system.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        .observatory-screen { width:100%; height:100vh; height:100dvh; background:#F4F7F6; position:relative; overflow:hidden; font-family:'Outfit',sans-serif; }
        .window-background { position:absolute; top:0; left:0; right:0; height:50%; background:linear-gradient(180deg,#87CEEB 0%,#E0F7FA 100%); border-bottom:12px solid white; box-shadow:0 20px 40px rgba(0,0,0,0.05); z-index:1; }
        .window-sun { position:absolute; top:clamp(30px,8vh,60px); right:clamp(50px,15vw,150px); width:clamp(60px,10vw,100px); height:clamp(60px,10vw,100px); background:#FFD966; border-radius:50%; box-shadow:0 0 60px rgba(255,217,102,0.6); animation:sun-glow 4s ease-in-out infinite; }
        @keyframes sun-glow { 0%,100%{transform:scale(1);opacity:0.8;} 50%{transform:scale(1.1);opacity:1;} }
        .floor { position:absolute; bottom:0; left:0; right:0; height:50%; background:#FFFFFF; z-index:5; box-shadow:0 -20px 40px rgba(0,0,0,0.02); }
        .location-title { position:absolute; top:clamp(15px,3vw,40px); left:50%; transform:translateX(-50%); background:rgba(255,255,255,0.4); backdrop-filter:blur(15px); border:2px solid rgba(255,255,255,0.5); padding:clamp(12px,2vw,20px) clamp(25px,5vw,60px); border-radius:30px; box-shadow:0 20px 40px rgba(0,0,0,0.05); text-align:center; font-size:clamp(18px,3.5vw,28px); font-weight:900; color:#2C3E50; z-index:100; }
        .objects-container { position:absolute; bottom:clamp(60px,10vh,100px); left:50%; transform:translateX(-50%); width:min(950px,95vw); display:flex; justify-content:space-around; align-items:flex-end; z-index:20; flex-wrap:wrap; gap:clamp(10px,2vw,20px); padding:0 clamp(10px,2vw,20px); }
        .interactive-object { cursor:pointer; transition:all 0.4s cubic-bezier(0.175,0.885,0.32,1.275); position:relative; display:flex; flex-direction:column; align-items:center; }
        .interactive-object:hover { transform:translateY(-20px); }
        .object-label { margin-top:clamp(10px,2vw,25px); background:#2C3E50; color:white; padding:clamp(8px,1.2vw,12px) clamp(15px,2.5vw,30px); font-size:clamp(10px,1.3vw,12px); font-weight:700; border-radius:20px; box-shadow:0 10px 20px rgba(0,0,0,0.1); text-align:center; text-transform:uppercase; letter-spacing:1px; }
        .thermometer-obj { width:clamp(70px,10vw,120px); height:clamp(180px,25vh,300px); background:rgba(255,255,255,0.8); backdrop-filter:blur(10px); border-radius:60px; border:4px solid white; box-shadow:0 20px 40px rgba(0,0,0,0.05); display:flex; flex-direction:column; align-items:center; padding:clamp(10px,2vw,20px); position:relative; }
        .thermometer-tube { width:clamp(12px,2vw,20px); height:clamp(120px,18vh,200px); background:#F0F3F4; border-radius:10px; position:relative; overflow:hidden; }
        .thermometer-mercury { position:absolute; bottom:0; left:0; right:0; height:60%; background:linear-gradient(180deg,#E74C3C,#C0392B); border-radius:10px; }
        .thermometer-bulb { width:clamp(30px,5vw,50px); height:clamp(30px,5vw,50px); background:#E74C3C; border-radius:50%; margin-top:-15px; border:4px solid white; box-shadow:0 10px 20px rgba(231,76,60,0.3); }
        .windmill-obj { width:clamp(100px,15vw,180px); height:clamp(180px,25vh,300px); position:relative; display:flex; flex-direction:column; align-items:center; }
        .windmill-blades { width:clamp(90px,12vw,160px); height:clamp(90px,12vw,160px); position:relative; z-index:2; animation:rotate-blades 4s linear infinite; }
        @keyframes rotate-blades { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
        .windmill-blade { position:absolute; width:clamp(40px,5vw,70px); height:clamp(8px,1.5vw,15px); background:white; top:50%; left:50%; transform-origin:left center; border-radius:0 20px 20px 0; box-shadow:0 5px 10px rgba(0,0,0,0.05); }
        .windmill-blade:nth-child(1){transform:rotate(0deg) translateX(10px);} .windmill-blade:nth-child(2){transform:rotate(90deg) translateX(10px);} .windmill-blade:nth-child(3){transform:rotate(180deg) translateX(10px);} .windmill-blade:nth-child(4){transform:rotate(270deg) translateX(10px);}
        .windmill-tower { width:12px; height:clamp(100px,15vh,180px); background:white; border-radius:10px; margin-top:clamp(-40px,-6vw,-80px); box-shadow:0 10px 20px rgba(0,0,0,0.05); }
        .map-board-obj { width:clamp(150px,20vw,260px); height:clamp(180px,25vh,300px); background:white; border-radius:clamp(20px,4vw,40px); box-shadow:0 20px 40px rgba(0,0,0,0.05); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:clamp(15px,3vw,30px); border:4px solid white; }
        .map-icon { font-size:clamp(60px,12vw,120px); filter:drop-shadow(0 15px 30px rgba(0,0,0,0.1)); }
        .btn-back { position:fixed; top:clamp(15px,3vw,40px); left:clamp(15px,3vw,40px); background:rgba(255,255,255,0.4); backdrop-filter:blur(10px); border:2px solid rgba(255,255,255,0.5); color:#2C3E50; padding:clamp(10px,1.5vw,15px) clamp(15px,2.5vw,30px); border-radius:30px; font-weight:700; z-index:100; cursor:pointer; transition:all 0.3s; font-size:clamp(12px,1.5vw,16px); }
        .btn-back:hover { background:white; transform:translateX(-5px); }
        .btn-complete { background:#2ECC71; color:white; padding:clamp(12px,2vw,20px) clamp(25px,5vw,50px); border-radius:40px; font-family:'Outfit',sans-serif; font-weight:900; font-size:clamp(14px,2vw,18px); border:none; cursor:pointer; box-shadow:0 15px 30px rgba(46,204,113,0.3); transition:all 0.3s; text-transform:uppercase; letter-spacing:1px; }
        .btn-complete:hover { transform:scale(1.05) translateY(-5px); background:#27AE60; }
        .nav-bottom { position:fixed; bottom:clamp(15px,3vw,40px); left:50%; transform:translateX(-50%); z-index:100; }
    </style>
</head>
<body>
    <div class="screen-container observatory-screen">
        <div class="window-background"><div class="window-sun"></div></div>
        <div class="floor"></div>
        <button class="btn-back" onclick="goBackToHub()">← EILANDEN</button>
        <div class="location-title">OBSERVATORIUM</div>
        <div class="objects-container">
            <div class="interactive-object" onclick="openThermometer()">
                <div class="thermometer-obj"><div class="thermometer-tube"><div class="thermometer-mercury"></div></div><div class="thermometer-bulb"></div></div>
                <div class="object-label">🌡️ THERMOMETER</div>
            </div>
            <div class="interactive-object" onclick="openWindmill()">
                <div class="windmill-obj"><div class="windmill-blades"><div class="windmill-blade"></div><div class="windmill-blade"></div><div class="windmill-blade"></div><div class="windmill-blade"></div></div><div class="windmill-tower"></div></div>
                <div class="object-label">💨 WINDMOLEN</div>
            </div>
            <div class="interactive-object" onclick="openMap()">
                <div class="map-board-obj"><div class="map-icon">🗺️</div></div>
                <div class="object-label">🌍 WEERKAART</div>
            </div>
        </div>
        <div class="nav-bottom"><button class="btn-complete" onclick="completeAndReturn()">MISSIE VOLTOOID</button></div>
    </div>
    <script>
        function openThermometer() { window.location.href = '2.1-thermometer.html'; }
        function openWindmill() { window.location.href = '2.2-windmill.html'; }
        function openMap() { window.location.href = '2.3-interactive-map.html'; }
        function completeAndReturn() { sessionStorage.setItem('completed_observatory','true'); goBackToHub(); }
        function goBackToHub() { sessionStorage.setItem('destination','hub'); window.location.href = '1.5-loading.html'; }
    </script>
</body>
</html>
