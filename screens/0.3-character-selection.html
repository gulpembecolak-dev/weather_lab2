<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0.3 - Karakter Seçimi | Weather Lab Kids</title>
    <link rel="stylesheet" href="../design-system.css">
    <style>
        .character-screen {
            width: var(--screen-width);
            height: var(--screen-height);
            background: linear-gradient(180deg, #87CEEB 0%, #E8DAEF 100%);
            position: relative;
            overflow: hidden;
        }

        /* Decorative Background */
        .sky-detail {
            position: absolute;
            top: 50px; width: 100%;
            display: flex; justify-content: space-around;
            opacity: 0.5;
        }

        /* Title Section */
        .title-section {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
        }

        .welcome-text {
            font-size: var(--font-size-md);
            color: var(--text-dark);
            margin-bottom: 10px;
        }

        .instruction-text {
            font-size: var(--font-size-lg);
            color: var(--storm-purple);
            text-shadow: 2px 2px 0 white;
            background: rgba(255,255,255,0.3);
            padding: 10px 30px;
            border-radius: 20px;
        }

        /* Character Grid */
        .character-grid {
            position: absolute;
            top: 220px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px;
            align-items: flex-end;
        }

        /* Character Card - More like Figma */
        .character-card {
            width: 280px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .character-card:hover {
            transform: translateY(-10px);
        }

        .character-portrait-rich {
            width: 240px;
            height: 300px;
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .character-avatar {
            font-size: 160px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2));
            transition: transform 0.3s;
        }

        .character-card:hover .character-avatar {
            transform: scale(1.1);
        }

        /* Pedestal */
        .pedestal {
            width: 260px;
            height: 60px;
            background: var(--wood-mid);
            border: 6px solid var(--wood-dark);
            border-radius: 50% / 30px;
            box-shadow: 
                inset 0 0 0 4px var(--wood-light),
                0 15px 30px rgba(0,0,0,0.3);
            margin-top: -30px;
            position: relative;
            z-index: 1;
        }

        .character-card.selected .pedestal {
            background: var(--sun-yellow);
            border-color: #F39C12;
            box-shadow: 
                0 0 30px var(--glow),
                0 15px 30px rgba(0,0,0,0.3);
        }

        /* Character Info Plate */
        .character-plate {
            background: var(--wood-mid);
            border: 4px solid var(--wood-dark);
            padding: 15px 20px;
            margin-top: 20px;
            width: 100%;
            text-align: center;
            box-shadow: inset 0 0 0 2px var(--wood-light);
            border-radius: 8px;
        }

        .character-name {
            font-size: 20px;
            color: var(--parchment);
            margin-bottom: 8px;
        }

        .character-role {
            font-size: 10px;
            color: var(--sun-yellow);
            text-transform: uppercase;
        }

        /* Selection Indicator */
        .selection-check {
            position: absolute;
            top: -20px;
            right: 20px;
            background: #2ECC71;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 4px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            opacity: 0;
            transform: scale(0);
            transition: all 0.3s;
            z-index: 20;
        }

        .character-card.selected .selection-check {
            opacity: 1;
            transform: scale(1);
        }

        /* Confirm Button */
        .confirm-area {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
        }

        .confirm-area.visible {
            opacity: 1;
            pointer-events: all;
        }
    </style>
</head>
<body>
    <div class="screen-container character-screen">
        <div class="sky-detail">
            <span>☁️</span><span>✨</span><span>☁️</span>
        </div>

        <!-- Back Button -->
        <button class="btn-pixel btn-wood btn-back" onclick="goBack()">
            ← TERUG
        </button>

        <!-- Title Section -->
        <div class="title-section">
            <div class="welcome-text">WELKOM, <span id="playerNameDisplay" style="color: var(--wood-dark); font-weight: bold;">KAPITEIN</span></div>
            <div class="instruction-text">
                KIES JE PERSONAGE
            </div>
        </div>

        <!-- Character Selection Grid -->
        <div class="character-grid">
            <!-- Character 1: PAM -->
            <div class="character-card" onclick="selectCharacter('pam')" id="card-pam">
                <div class="selection-check">✅</div>
                <div class="character-portrait-rich">
                    <div class="character-avatar">👩‍🔬</div>
                </div>
                <div class="pedestal"></div>
                <div class="character-plate">
                    <div class="character-name">PAM</div>
                    <div class="character-role">Wetenschapper</div>
                </div>
            </div>

            <!-- Character 2: LILY -->
            <div class="character-card" onclick="selectCharacter('lily')" id="card-lily">
                <div class="selection-check">✅</div>
                <div class="character-portrait-rich">
                    <div class="character-avatar">👧</div>
                </div>
                <div class="pedestal"></div>
                <div class="character-plate">
                    <div class="character-name">LILY</div>
                    <div class="character-role">Ontdekker</div>
                </div>
            </div>

            <!-- Character 3: ERIC -->
            <div class="character-card" onclick="selectCharacter('eric')" id="card-eric">
                <div class="selection-check">✅</div>
                <div class="character-portrait-rich">
                    <div class="character-avatar">👦</div>
                </div>
                <div class="pedestal"></div>
                <div class="character-plate">
                    <div class="character-name">ERIC</div>
                    <div class="character-role">Stormjager</div>
                </div>
            </div>
        </div>

        <!-- Confirm Button -->
        <div class="confirm-area" id="confirmArea">
            <button class="btn-pixel btn-glow" style="min-width: 400px;" onclick="proceedToMap()">
                START AVONTUUR →
            </button>
        </div>
    </div>

    <script>
        let selectedCharacter = null;

        window.onload = function() {
            const playerName = sessionStorage.getItem('playerName') || 'KAPITEIN';
            document.getElementById('playerNameDisplay').textContent = playerName.toUpperCase();
        };

        function selectCharacter(character) {
            document.querySelectorAll('.character-card').forEach(card => card.classList.remove('selected'));
            document.getElementById(`card-${character}`).classList.add('selected');
            selectedCharacter = character;
            document.getElementById('confirmArea').classList.add('visible');
        }

        function proceedToMap() {
            if (selectedCharacter) {
                // Store selected character in session
                sessionStorage.setItem('selectedCharacter', selectedCharacter);
                
                // Proceed to hub map
                window.location.href = '1.0-hub-map.html';
            }
        }

        function goBack() {
            window.location.href = '0.2-name-entry.html';
        }
    </script>
</body>
</html>
