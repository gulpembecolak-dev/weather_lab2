<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0.1 - Giriş Ekranı | Weather Lab Kids</title>
    <link rel="stylesheet" href="../design-system.css">
    <script src="../js/analytics.js"></script>
    <script src="../js/sound.js"></script>
    <script src="../js/scaling.js"></script>
    <script>window.SCREEN_NAME = 'Idle Screen';</script>
    <style>
        .idle-screen {
            width: var(--screen-width);
            height: var(--screen-height);
            background: linear-gradient(180deg, #87CEEB 0%, #5DADE2 40%, #3498DB 100%);
            position: relative;
            overflow: hidden;
        }

        /* Animated Clouds */
        .cloud {
            position: absolute;
            background: var(--cloud-white);
            border-radius: 100px;
            opacity: 0.9;
            animation: float-cloud linear infinite;
        }

        .cloud::before,
        .cloud::after {
            content: '';
            position: absolute;
            background: var(--cloud-white);
            border-radius: 100px;
        }

        .cloud-1 {
            width: 120px;
            height: 40px;
            top: 15%;
            left: -150px;
            animation-duration: 45s;
        }

        .cloud-1::before {
            width: 60px;
            height: 60px;
            top: -30px;
            left: 20px;
        }

        .cloud-1::after {
            width: 80px;
            height: 50px;
            top: -20px;
            left: 50px;
        }

        .cloud-2 {
            width: 100px;
            height: 35px;
            top: 35%;
            left: -120px;
            animation-duration: 60s;
            animation-delay: 5s;
        }

        .cloud-2::before {
            width: 50px;
            height: 50px;
            top: -25px;
            left: 15px;
        }

        .cloud-2::after {
            width: 70px;
            height: 45px;
            top: -18px;
            left: 40px;
        }

        .cloud-3 {
            width: 140px;
            height: 45px;
            top: 60%;
            left: -160px;
            animation-duration: 50s;
            animation-delay: 10s;
        }

        .cloud-3::before {
            width: 70px;
            height: 70px;
            top: -35px;
            left: 25px;
        }

        .cloud-3::after {
            width: 90px;
            height: 55px;
            top: -25px;
            left: 60px;
        }

        @keyframes float-cloud {
            0% { transform: translateX(-200px); }
            100% { transform: translateX(1200px); }
        }

        /* Sun */
        .sun {
            position: absolute;
            top: 80px;
            right: 120px;
            width: 120px;
            height: 120px;
            background: var(--sun-yellow);
            border-radius: 50%;
            box-shadow: 
                0 0 40px rgba(247, 220, 111, 0.8),
                0 0 80px rgba(247, 220, 111, 0.5),
                inset 0 0 30px rgba(255, 255, 255, 0.5);
            animation: sun-pulse 3s ease-in-out infinite;
        }

        @keyframes sun-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Grass/Ground */
        .ground {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 200px;
            background: linear-gradient(180deg, #58D68D 0%, #27AE60 100%);
            border-top: 6px solid #229954;
        }

        /* Grass Details (Pixel Style) */
        .grass-detail {
            position: absolute;
            bottom: 200px;
            width: 100%;
            height: 40px;
            background: 
                repeating-linear-gradient(
                    90deg,
                    #58D68D 0px,
                    #58D68D 3px,
                    #52BE80 3px,
                    #52BE80 6px,
                    #58D68D 6px,
                    #58D68D 9px,
                    #45B566 9px,
                    #45B566 12px
                );
        }

        /* Weather Lab Building (Simplified) */
        .building {
            position: absolute;
            bottom: 200px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 180px;
        }

        .building-body {
            width: 180px;
            height: 120px;
            background: #E8DAEF;
            border: 6px solid var(--wood-dark);
            position: absolute;
            bottom: 0;
            left: 10px;
        }

        .building-roof {
            width: 200px;
            height: 0;
            border-left: 100px solid transparent;
            border-right: 100px solid transparent;
            border-bottom: 70px solid #8E44AD;
            position: absolute;
            top: 0;
            filter: drop-shadow(0 -4px 0 var(--wood-dark));
        }

        .building-window {
            width: 40px;
            height: 40px;
            background: #5DADE2;
            border: 3px solid var(--wood-dark);
            position: absolute;
        }

        .window-1 { top: 25px; left: 25px; }
        .window-2 { top: 25px; right: 25px; }
        .window-3 { top: 75px; left: 25px; }
        .window-3::after {
            content: '💨';
            position: absolute;
            top: 5px;
            left: 5px;
            font-size: 24px;
        }

        /* Title Panel */
        .title-panel {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(236, 240, 241, 0.95);
            border: 8px solid var(--wood-dark);
            padding: var(--spacing-md);
            text-align: center;
            box-shadow: 
                0 12px 32px var(--shadow),
                inset 0 0 0 4px var(--wood-light);
            min-width: 600px;
        }

        .title-main {
            font-size: 32px;
            color: var(--storm-purple);
            text-shadow: 3px 3px 0 rgba(255, 255, 255, 0.8);
            margin-bottom: var(--spacing-sm);
            letter-spacing: 3px;
        }

        .title-sub {
            font-size: var(--font-size-md);
            color: var(--text-dark);
            margin-top: var(--spacing-xs);
        }

        /* Start Button */
        .start-button {
            position: absolute;
            bottom: 280px;
            left: 50%;
            transform: translateX(-50%);
            padding: 24px 48px;
            font-size: 24px;
            min-width: 400px;
            animation: pulse-glow 2s infinite;
            transition: transform 0.1s;
        }

        .start-button:active {
            transform: translateX(-50%) scale(0.9, 1.1); /* Squash and Stretch */
        }

        @keyframes pulse-glow {
            0%, 100% { 
                box-shadow: 
                    0 0 30px var(--glow),
                    0 0 60px var(--glow),
                    0 8px 0 #D4A12A,
                    0 12px 24px var(--shadow);
            }
            50% { 
                box-shadow: 
                    0 0 50px var(--glow),
                    0 0 100px var(--glow),
                    0 8px 0 #D4A12A,
                    0 12px 24px var(--shadow);
            }
        }

        /* Decorative Elements */
        .flower {
            position: absolute;
            font-size: 32px;
            animation: sway 3s ease-in-out infinite;
        }

        .flower-1 { bottom: 210px; left: 15%; animation-delay: 0s; }
        .flower-2 { bottom: 210px; left: 25%; animation-delay: 0.5s; }
        .flower-3 { bottom: 210px; right: 15%; animation-delay: 1s; }
        .flower-4 { bottom: 210px; right: 25%; animation-delay: 1.5s; }

        @keyframes sway {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        /* Instructions */
        .instruction-text {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            font-size: var(--font-size-sm);
            color: var(--text-light);
            background: rgba(44, 62, 80, 0.8);
            padding: var(--spacing-sm) var(--spacing-md);
            border: 3px solid var(--text-dark);
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="screen-container idle-screen">
        <!-- Sky Elements -->
        <div class="sun"></div>
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>

        <!-- Title Panel -->
        <div class="title-panel">
            <div class="title-main">WEATHER LAB<br>KIDS</div>
            <div class="title-sub">🌤️ De Weer Eilanden 🌤️</div>
        </div>

        <!-- Main Building -->
        <div class="building">
            <div class="building-roof"></div>
            <div class="building-body">
                <div class="building-window window-1"></div>
                <div class="building-window window-2"></div>
                <div class="building-window window-3"></div>
            </div>
        </div>

        <!-- Ground -->
        <div class="grass-detail"></div>
        <div class="ground"></div>

        <!-- Decorative Flowers -->
        <div class="flower flower-1">🌼</div>
        <div class="flower flower-2">🌻</div>
        <div class="flower flower-3">🌼</div>
        <div class="flower flower-4">🌻</div>

        <!-- Start Button -->
        <button class="btn-pixel btn-glow start-button" onclick="nextScreen()">
            RAAK AAN OM<br>TE STARTEN
        </button>

        <!-- Instructions -->
        <div class="instruction-text">
            👆 Tik op het gele scherm om je avontuur te beginnen
        </div>
    </div>

    <script>
        function nextScreen() {
            window.location.href = '0.2-name-entry.html';
        }
    </script>
</body>
</html>
