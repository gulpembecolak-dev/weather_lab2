<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0.1 - Giriş Ekranı | Weather Lab Kids</title>
    <link rel="stylesheet" href="../design-system.css">
    <script src="../js/analytics.js"></script>
    <script src="../js/sound.js"></script>
    <script src="../js/scaling.js"></script>
    <script>window.SCREEN_NAME = 'Idle Screen';</script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        .idle-screen {
            width: var(--screen-width);
            height: var(--screen-height);
            background: linear-gradient(180deg, #87CEEB 0%, #E0F7FA 100%);
            position: relative;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
        }

        /* Sun Rays - Softer & Modern */
        .sun-rays {
            position: absolute;
            top: -150px;
            right: -150px;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.6) 0%, transparent 70%);
            animation: rotate-rays 40s linear infinite;
            pointer-events: none;
            filter: blur(20px);
        }

        @keyframes rotate-rays {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Modern Soft Clouds */
        .soft-cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 100px;
            animation: float-cloud linear infinite;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .soft-cloud::before, .soft-cloud::after {
            content: '';
            position: absolute;
            background: inherit;
            border-radius: 50%;
        }

        .soft-cloud::before { width: 50%; height: 100%; top: -40%; left: 15%; }
        .soft-cloud::after { width: 40%; height: 80%; top: -20%; right: 15%; }

        @keyframes float-cloud {
            0% { transform: translateX(-300px); }
            100% { transform: translateX(1300px); }
        }

        /* Modern Title Panel - Glassmorphism */
        .title-container {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 50;
        }

        .title-panel-modern {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.4);
            padding: 40px 100px;
            border-radius: 40px;
            box-shadow: 
                0 30px 60px rgba(0,0,0,0.1),
                inset 0 0 0 1px rgba(255,255,255,0.2);
            animation: float-title 6s ease-in-out infinite;
        }

        @keyframes float-title {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .title-main {
            font-size: 64px;
            font-weight: 900;
            color: #2C3E50;
            margin-bottom: 15px;
            letter-spacing: -1px;
            text-transform: uppercase;
            line-height: 0.9;
        }

        .title-sub {
            font-size: 20px;
            color: #34495E;
            font-weight: 400;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        /* Ground & Environment - Softer Layers */
        .ground-layered {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 320px;
            z-index: 10;
        }

        .hill {
            position: absolute;
            bottom: -50px;
            border-radius: 50% 50% 0 0;
            filter: blur(1px);
        }

        .hill-1 {
            width: 1200px; height: 300px;
            background: linear-gradient(180deg, #58D68D 0%, #2ECC71 100%);
            left: -200px;
            z-index: 1;
            opacity: 0.8;
        }

        .hill-2 {
            width: 1400px; height: 350px;
            background: linear-gradient(180deg, #48C9B0 0%, #1ABC9C 100%);
            right: -300px;
            z-index: 2;
        }

        /* Modern CTA Button */
        .start-button-modern {
            position: absolute;
            bottom: 220px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 150;
        }

        .btn-start-final {
            min-width: 400px;
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            font-weight: 700;
            padding: 30px 60px;
            background: #FFD966;
            color: #2C3E50;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 
                0 15px 35px rgba(255, 217, 102, 0.4),
                0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-start-final:hover {
            transform: scale(1.05) translateY(-5px);
            background: #FFE082;
            box-shadow: 
                0 25px 45px rgba(255, 217, 102, 0.5),
                0 10px 20px rgba(0,0,0,0.1);
        }

        .btn-start-final:active {
            transform: scale(0.98);
        }

        /* Subtle Instruction Hint */
        .instruction-hint {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            color: #2C3E50;
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 1px;
            opacity: 0.6;
            animation: pulse-text 2s infinite;
        }

        @keyframes pulse-text {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        /* Modern Foreground Decor */
        .modern-flower {
            position: absolute;
            bottom: 40px;
            z-index: 100;
            font-size: 40px;
            animation: sway 4s ease-in-out infinite;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1));
        }

        @keyframes sway {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-5px) rotate(5deg); }
        }
    </style>
</head>
<body>
    <div class="screen-container idle-screen">
        <div class="sun-rays"></div>
        
        <!-- Modern Clouds -->
        <div class="soft-cloud" style="width: 200px; height: 60px; top: 15%; left: -200px; animation-duration: 40s;"></div>
        <div class="soft-cloud" style="width: 150px; height: 45px; top: 30%; left: -150px; animation-duration: 55s; animation-delay: -10s;"></div>
        <div class="soft-cloud" style="width: 250px; height: 75px; top: 45%; left: -300px; animation-duration: 45s; animation-delay: -25s;"></div>

        <!-- Modern Title Section -->
        <div class="title-container">
            <div class="title-panel-modern">
                <div class="title-main">WEER<br>EILANDEN</div>
                <div class="title-sub">Ontdek de Kracht van Natuur</div>
            </div>
        </div>

        <!-- Ground & Environment -->
        <div class="ground-layered">
            <div class="hill hill-1"></div>
            <div class="hill hill-2"></div>
        </div>

        <!-- Modern Decor -->
        <div class="modern-flower" style="left: 10%;">🌿</div>
        <div class="modern-flower" style="left: 18%; animation-delay: -1s; font-size: 30px;">🌼</div>
        <div class="modern-flower" style="right: 15%; animation-delay: -2s;">🌿</div>
        <div class="modern-flower" style="right: 22%; animation-delay: -3s; font-size: 35px;">🌸</div>

        <!-- CTA Button -->
        <div class="start-button-modern">
            <button class="btn-start-final" onclick="nextScreen()">
                Start het Avontuur
            </button>
        </div>

        <!-- Subtle Instructions -->
        <div class="instruction-hint">
            Tik op het scherm om te beginnen
        </div>
    </div>

    <script>
        function nextScreen() {
            window.location.href = '0.2-name-entry.html';
        }
    </script>
</body>
</html>
