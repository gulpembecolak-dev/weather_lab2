<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0.1 - Giriş Ekranı | Weather Lab Kids</title>
    <link rel="stylesheet" href="../design-system.css">
    <script src="../js/analytics.js"></script>
    <script src="../js/sound.js"></script>
    <script src="../js/scaling.js"></script>
    <script>window.SCREEN_NAME = 'Idle Screen';</script>
    <style>
        .idle-screen {
            width: var(--screen-width);
            height: var(--screen-height);
            background: linear-gradient(180deg, #FFD966 0%, #87CEEB 40%, #5DADE2 100%);
            position: relative;
            overflow: hidden;
        }

        /* Sun Rays */
        .sun-rays {
            position: absolute;
            top: -100px;
            right: -100px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.4) 0%, transparent 70%);
            animation: rotate-rays 20s linear infinite;
            pointer-events: none;
        }

        @keyframes rotate-rays {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Animated Clouds - More Pixelated */
        .pixel-cloud {
            position: absolute;
            background: var(--cloud-white);
            box-shadow: 
                4px 4px 0 rgba(0,0,0,0.1),
                inset -4px -4px 0 rgba(0,0,0,0.05);
            animation: float-cloud linear infinite;
        }

        .pixel-cloud::after {
            content: '';
            position: absolute;
            background: var(--cloud-white);
            width: 60%; height: 60%;
            top: -30%; left: 20%;
        }

        @keyframes float-cloud {
            0% { transform: translateX(-200px); }
            100% { transform: translateX(1200px); }
        }

        /* Hanging Sign */
        .sign-hanger {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 50;
        }

        .rope {
            width: 6px;
            height: 80px;
            background: var(--wood-dark);
            margin: 0 40px;
            box-shadow: 2px 0 0 rgba(0,0,0,0.2);
        }

        .ropes-container {
            display: flex;
            justify-content: center;
        }

        .title-panel-rich {
            background: var(--wood-mid);
            border: 10px solid var(--wood-dark);
            padding: 40px 60px;
            text-align: center;
            box-shadow: 
                inset 0 0 0 4px var(--wood-light),
                0 20px 40px rgba(0,0,0,0.4);
            position: relative;
            transform-origin: top center;
            animation: swing 4s ease-in-out infinite;
        }

        @keyframes swing {
            0%, 100% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
        }

        .title-main {
            font-size: 40px;
            color: var(--parchment);
            text-shadow: 4px 4px 0 var(--wood-dark);
            margin-bottom: 15px;
            letter-spacing: 4px;
        }

        .title-sub {
            font-size: 18px;
            color: var(--sun-yellow);
            text-shadow: 2px 2px 0 var(--wood-dark);
        }

        /* Ground & Environment */
        .ground-layered {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 250px;
            z-index: 10;
        }

        .hill {
            position: absolute;
            bottom: 0;
            border-radius: 50% 50% 0 0;
        }

        .hill-1 {
            width: 800px; height: 200px;
            background: #27AE60;
            left: -100px;
            z-index: 1;
        }

        .hill-2 {
            width: 900px; height: 250px;
            background: #2ECC71;
            right: -150px;
            z-index: 2;
        }

        /* Foreground Flowers */
        .flower-cluster {
            position: absolute;
            bottom: 20px;
            z-index: 100;
            font-size: 40px;
            animation: sway 3s ease-in-out infinite;
        }

        @keyframes sway {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-5px) rotate(5deg); }
        }

        /* Start Button */
        .start-button-rich {
            position: absolute;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 150;
        }
    </style>
</head>
<body>
    <div class="screen-container idle-screen">
        <div class="sun-rays"></div>
        
        <!-- Clouds -->
        <div class="pixel-cloud" style="width: 150px; height: 40px; top: 15%; left: -100px; animation-duration: 40s;"></div>
        <div class="pixel-cloud" style="width: 120px; height: 35px; top: 30%; left: -150px; animation-duration: 55s; animation-delay: 5s;"></div>
        <div class="pixel-cloud" style="width: 180px; height: 45px; top: 55%; left: -200px; animation-duration: 45s; animation-delay: 10s;"></div>

        <!-- Hanging Title Sign -->
        <div class="sign-hanger">
            <div class="ropes-container">
                <div class="rope"></div>
                <div class="rope"></div>
            </div>
            <div class="title-panel-rich">
                <div class="title-main">WEER<br>EILANDEN</div>
                <div class="title-sub">Ontdek de Kracht van Natuur</div>
            </div>
        </div>

        <!-- Environment -->
        <div class="ground-layered">
            <div class="hill hill-1"></div>
            <div class="hill hill-2"></div>
        </div>

        <!-- Foreground Flowers cluster -->
        <div class="flower-cluster" style="left: 10%;">🌷🌼🌸</div>
        <div class="flower-cluster" style="right: 15%; animation-delay: 1s;">🌻🌷🌼</div>
        <div class="flower-cluster" style="left: 40%; animation-delay: 0.5s; font-size: 30px;">🌸🌼</div>

        <!-- Start Button -->
        <div class="start-button-rich">
            <button class="btn-pixel btn-glow" style="min-width: 450px; font-size: 24px;" onclick="nextScreen()">
                RAAK AAN OM<br>TE STARTEN
            </button>
        </div>

        <!-- Instructions -->
        <div class="instruction-text" style="z-index: 200; bottom: 40px;">
            👆 Tik op het scherm om te beginnen
        </div>
    </div>

    <script>
        function nextScreen() {
            window.location.href = '0.2-name-entry.html';
        }
    </script>
</body>
</html>
