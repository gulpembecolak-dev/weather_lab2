<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>4.2 - Phygital Opdracht | Weather Lab Kids</title>
    <link rel="stylesheet" href="../design-system.css">
    <style>
        .phygital-screen { width: var(--screen-width); height: var(--screen-height); background: linear-gradient(135deg, #F39C12 0%, #E67E22 100%); position: relative; overflow: hidden; }
        .phygital-panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(236, 240, 241, 0.98); border: 8px solid var(--wood-dark); padding: 40px; width: 700px; border-radius: 16px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5); text-align: center; }
        .phygital-title { font-size: 28px; color: #E67E22; margin-bottom: 24px; }
        .qr-placeholder { width: 300px; height: 300px; background: white; border: 6px solid var(--wood-dark); margin: 24px auto; display: flex; align-items: center; justify-content: center; font-size: 120px; border-radius: 16px; }
        .phygital-text { font-size: 16px; color: var(--text-dark); line-height: 2; }
    </style>
</head>
<body>
    <div class="screen-container phygital-screen">
        <button class="btn-pixel btn-wood btn-back" onclick="history.back()">← TERUG</button>
        <div class="phygital-panel">
            <div class="phygital-title">🏠 MAAK THUIS JE EIGEN WINDMETER!</div>
            <div class="phygital-text">
                Scan deze QR-code met je telefoon en krijg:<br><br>
                ✅ Stap-voor-stap instructies<br>
                ✅ Materialen lijst<br>
                ✅ Videotutorial<br>
            </div>
            <div class="qr-placeholder">
                📱
            </div>
            <div class="phygital-text" style="font-size: 12px; color: #7F8C8D;">
                Je ouders krijgen de PDF per e-mail!
            </div>
            <button class="btn-pixel btn-glow" style="margin-top: 24px; width: 100%;" onclick="history.back()">
                GESCAND! →
            </button>
        </div>
    </div>
</body>
</html>
