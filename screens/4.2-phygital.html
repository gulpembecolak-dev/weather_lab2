<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4.2 - Phygital Opdracht | Weather Lab Kids</title>
    <link rel="stylesheet" href="../design-system.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        .phygital-screen { width:100%; height:100vh; height:100dvh; background:linear-gradient(135deg,var(--sky-blue) 0%,var(--sky-light) 100%); position:relative; overflow-x:hidden; overflow-y:auto; font-family:var(--font-modern); display:flex; align-items:center; justify-content:center; }
        .soft-cloud { position:fixed; background:rgba(255,255,255,0.5); backdrop-filter:blur(8px); border-radius:100px; animation:float-cloud linear infinite; box-shadow:0 10px 30px rgba(0,0,0,0.05); pointer-events:none; }
        .soft-cloud::before,.soft-cloud::after { content:''; position:absolute; background:inherit; border-radius:50%; }
        .soft-cloud::before { width:50%; height:100%; top:-40%; left:15%; }
        .soft-cloud::after { width:40%; height:80%; top:-20%; right:15%; }
        .cloud-1{width:min(200px,25vw);height:min(60px,7.5vw);top:10%;animation-duration:45s;} .cloud-2{width:min(150px,20vw);height:min(45px,5.5vw);top:25%;animation-duration:60s;animation-delay:-10s;} .cloud-3{width:min(250px,30vw);height:min(75px,9vw);top:80%;animation-duration:50s;animation-delay:-25s;}
        @keyframes float-cloud{0%{transform:translateX(-300px);}100%{transform:translateX(calc(100vw + 300px));}}
        .phygital-panel { background:rgba(255,255,255,0.7); backdrop-filter:blur(20px); border:2px solid rgba(255,255,255,0.5); padding:clamp(30px,5vw,60px); width:min(800px,92vw); border-radius:clamp(20px,4vw,40px); box-shadow:0 40px 100px rgba(0,0,0,0.1); text-align:center; z-index:10; }
        .phygital-title { font-size:clamp(20px,4vw,32px); font-weight:900; color:var(--text-dark); margin-bottom:clamp(15px,3vw,30px); text-transform:uppercase; letter-spacing:1px; }
        .qr-placeholder { width:clamp(160px,30vw,280px); height:clamp(160px,30vw,280px); background:white; border:4px solid var(--sun-yellow); margin:clamp(15px,3vw,30px) auto; display:flex; align-items:center; justify-content:center; font-size:clamp(60px,12vw,120px); border-radius:clamp(15px,3vw,30px); box-shadow:0 15px 30px var(--sun-glow); animation:qr-bounce 2s ease-in-out infinite; }
        @keyframes qr-bounce { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
        .phygital-text { font-size:clamp(14px,2vw,18px); color:var(--text-dark); line-height:1.8; font-weight:400; }
        .phygital-text strong { font-weight:900; color:#E67E22; }
        .btn-confirm { width:100%; padding:clamp(18px,3vw,30px); font-size:clamp(18px,3vw,26px); margin-top:clamp(15px,3vw,30px); }
        .btn-back { position:fixed; top:clamp(15px,3vw,40px); left:clamp(15px,3vw,40px); z-index:100; }
    </style>
</head>
<body>
    <div class="screen-container phygital-screen">
        <div class="soft-cloud cloud-1"></div><div class="soft-cloud cloud-2"></div><div class="soft-cloud cloud-3"></div>
        <button class="btn-modern btn-secondary btn-back" onclick="history.back()">← TERUG</button>
        <div class="phygital-panel">
            <div class="phygital-title">🏠 MAAK JE EIGEN WINDMETER!</div>
            <div class="phygital-text">Scan deze QR-code met je telefoon en krijg:<br><br>✅ Stap-voor-stap instructies<br>✅ Materialen lijst<br>✅ Videotutorial</div>
            <div class="qr-placeholder">📱</div>
            <div class="phygital-text" style="font-size:clamp(11px,1.5vw,14px);color:var(--text-muted);margin-top:10px;">Je ouders krijgen de PDF per e-mail!</div>
            <button class="btn-modern btn-primary btn-confirm" onclick="history.back()">GESCAND! →</button>
        </div>
    </div>
</body>
</html>
