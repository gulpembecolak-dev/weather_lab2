<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>5.2 - Gefeliciteerd! | Weather Lab Kids</title>
    <link rel="stylesheet" href="../design-system.css">
    <style>
        .victory-screen { width: var(--screen-width); height: var(--screen-height); background: linear-gradient(135deg, #F39C12 0%, #E67E22 40%, #D35400 100%); position: relative; overflow: hidden; animation: rainbow-bg 5s ease-in-out infinite; }
        @keyframes rainbow-bg {
            0%, 100% { filter: hue-rotate(0deg); }
            50% { filter: hue-rotate(30deg); }
        }
        .confetti { position: absolute; width: 10px; height: 10px; background: var(--sun-yellow); animation: fall 3s linear infinite; }
        @keyframes fall {
            0% { top: -10px; transform: rotate(0deg); opacity: 1; }
            100% { top: 100%; transform: rotate(360deg); opacity: 0; }
        }
        .victory-panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(236, 240, 241, 0.98); border: 8px solid var(--wood-dark); padding: 40px; width: 700px; border-radius: 16px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5); text-align: center; }
        .trophy { font-size: 150px; margin-bottom: 24px; animation: trophy-bounce 1s ease-in-out infinite; }
        @keyframes trophy-bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .victory-title { font-size: 36px; color: #E67E22; margin-bottom: 16px; text-shadow: 3px 3px 0 rgba(255, 255, 255, 0.5); }
        .score-display { font-size: 48px; color: var(--text-dark); margin: 24px 0; }
        .victory-text { font-size: 18px; color: var(--text-dark); line-height: 2; margin-bottom: 32px; }
        .badge-display { font-size: 80px; margin: 24px 0; animation: badge-spin 3s linear infinite; }
        @keyframes badge-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="screen-container victory-screen">
        <!-- Confetti -->
        <script>
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.animationDelay = Math.random() * 3 + 's';
                confetti.style.background = ['#E74C3C', '#F39C12', '#2ECC71', '#3498DB', '#9B59B6'][Math.floor(Math.random() * 5)];
                document.body.appendChild(confetti);
            }
        </script>
        
        <div class="victory-panel">
            <div class="trophy">🏆</div>
            
            <div class="victory-title">
                GEFELICITEERD,<br>
                <span id="playerNameVictory">KAPITEIN</span>!
            </div>
            
            <div class="score-display">
                <span id="scoreDisplay">10</span> / 10 correct!
            </div>
            
            <div class="victory-text">
                Je bent nu officieel een<br>
                <strong style="color: #E67E22; font-size: 24px;">JONGE METEOROLOOG</strong>!
            </div>
            
            <div class="badge-display">🎖️</div>
            
            <div class="victory-text" style="font-size: 16px; background: rgba(52, 152, 219, 0.1); border: 4px solid #3498DB; padding: 20px; border-radius: 12px;">
                📍 Ga naar de <strong>museumbalie</strong><br>
                en ontvang je officiële badge!<br><br>
                🎁 Laat deze scherm zien aan de medewerker
            </div>
            
            <button class="btn-pixel btn-glow" style="margin-top: 32px; width: 100%;" onclick="restart()">
                🔄 OPNIEUW SPELEN
            </button>
        </div>
    </div>

    <script>
        window.onload = function() {
            const playerName = sessionStorage.getItem('playerName') || 'KAPITEIN';
            const score = sessionStorage.getItem('quizScore') || '10';
            
            document.getElementById('playerNameVictory').textContent = playerName.toUpperCase();
            document.getElementById('scoreDisplay').textContent = score;
        };
        
        function restart() {
            if (confirm('Weet je zeker dat je opnieuw wilt beginnen? Al je voortgang gaat verloren.')) {
                sessionStorage.clear();
                window.location.href = '0.1-idle-screen.html';
            }
        }
    </script>
</body>
</html>
