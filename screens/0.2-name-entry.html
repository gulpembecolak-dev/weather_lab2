<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0.2 - İsim Giriş | Weather Lab Kids</title>
    <link rel="stylesheet" href="../design-system.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        .name-entry-screen {
            width: var(--screen-width);
            height: var(--screen-height);
            background: linear-gradient(135deg, #87CEEB 0%, #E0F7FA 100%);
            position: relative;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
        }

        /* Modern Soft Clouds */
        .soft-cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 100px;
            animation: float-cloud linear infinite;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            pointer-events: none;
        }

        .soft-cloud::before, .soft-cloud::after {
            content: '';
            position: absolute;
            background: inherit;
            border-radius: 50%;
        }

        .soft-cloud::before { width: 50%; height: 100%; top: -40%; left: 15%; }
        .soft-cloud::after { width: 40%; height: 80%; top: -20%; right: 15%; }

        @keyframes float-cloud {
            0% { transform: translateX(-300px); }
            100% { transform: translateX(1300px); }
        }

        /* Main Registration Panel - Modern Glassmorphism */
        .registration-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            padding: 80px 60px 50px;
            width: 800px;
            box-shadow: 
                0 40px 100px rgba(0, 0, 0, 0.1),
                inset 0 0 0 1px rgba(255, 255, 255, 0.5);
            border-radius: 40px;
            z-index: 10;
        }

        /* Title */
        .registration-title {
            font-size: 36px;
            font-weight: 900;
            color: #2C3E50;
            text-align: center;
            margin-bottom: 40px;
            line-height: 1.2;
            letter-spacing: -0.5px;
        }

        /* Reward Panel - Modern Card */
        .reward-panel {
            background: rgba(255, 217, 102, 0.15);
            border: 2px solid rgba(255, 217, 102, 0.4);
            padding: 30px;
            margin-bottom: 40px;
            border-radius: 24px;
            position: relative;
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .reward-icon-badge {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            flex-shrink: 0;
            box-shadow: 0 15px 30px rgba(255, 217, 102, 0.2);
            animation: pulse-badge 2s ease-in-out infinite;
        }

        @keyframes pulse-badge {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.05) rotate(5deg); }
        }

        .reward-content {
            flex: 1;
        }

        .reward-title-small {
            font-size: 14px;
            color: #D35400;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .reward-desc {
            font-size: 18px;
            color: #2C3E50;
            line-height: 1.6;
        }

        .reward-desc strong {
            color: #E67E22;
            font-weight: 900;
        }

        /* Input Area */
        .input-group {
            background: white;
            padding: 40px;
            border-radius: 32px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            position: relative;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .input-group:focus-within {
            border-color: #FFD966;
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(255, 217, 102, 0.2);
        }

        .input-label {
            font-size: 14px;
            color: #7F8C8D;
            margin-bottom: 20px;
            display: block;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .name-input {
            width: 100%;
            padding: 25px;
            font-family: 'Outfit', sans-serif;
            font-size: 40px;
            font-weight: 900;
            text-align: center;
            border: none;
            background: #F8F9F9;
            color: #2C3E50;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 20px;
            transition: all 0.3s;
        }

        .name-input:focus {
            outline: none;
            background: white;
        }

        .name-input::placeholder {
            color: #BDC3C7;
            text-transform: none;
            font-weight: 400;
            letter-spacing: 0;
        }

        /* Character Count */
        .char-count {
            text-align: right;
            font-size: 12px;
            color: #95A5A6;
            margin-top: 20px;
            font-weight: 700;
        }

        /* Button Group */
        .button-area {
            display: flex;
            justify-content: center;
        }

        .btn-start-adventure {
            min-width: 500px;
            font-family: 'Outfit', sans-serif;
            font-size: 26px;
            font-weight: 900;
            padding: 30px 60px;
            background: #FFD966;
            color: #2C3E50;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 
                0 15px 35px rgba(255, 217, 102, 0.4),
                0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-start-adventure:hover:not(:disabled) {
            transform: scale(1.05) translateY(-5px);
            background: #FFE082;
            box-shadow: 
                0 25px 45px rgba(255, 217, 102, 0.5),
                0 10px 20px rgba(0,0,0,0.1);
        }

        .btn-start-adventure:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Back Button Override */
        .btn-back {
            position: absolute;
            top: 40px;
            left: 40px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: #2C3E50;
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: 700;
            z-index: 100;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-back:hover {
            background: white;
            transform: translateX(-5px);
        }
    </style>
</head>
<body>
    <div class="screen-container name-entry-screen">
        <!-- Modern Clouds -->
        <div class="soft-cloud" style="width: 200px; height: 60px; top: 10%; left: -200px; animation-duration: 45s;"></div>
        <div class="soft-cloud" style="width: 150px; height: 45px; top: 25%; left: -150px; animation-duration: 60s; animation-delay: -10s;"></div>
        <div class="soft-cloud" style="width: 250px; height: 75px; top: 80%; left: -300px; animation-duration: 50s; animation-delay: -25s;"></div>

        <!-- Back Button -->
        <button class="btn-back" onclick="goBack()">
            ← TERUG
        </button>

        <!-- Main Registration Panel -->
        <div class="registration-panel">
            <!-- Title -->
            <div class="registration-title">
                WELKOM BIJ HET LAB!<br>
                HOE MOETEN WE JE NOEMEN?
            </div>

            <!-- Reward Panel -->
            <div class="reward-panel">
                <div class="reward-icon-badge">🎖️</div>
                <div class="reward-content">
                    <div class="reward-title-small">✨ JOUW MISSIE BELONING ✨</div>
                    <div class="reward-desc">
                        Ontdek alle eilanden en verdien de officiële 
                        <strong>JONGE METEOROLOOG</strong> badge!
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-group">
                <label class="input-label">Voer hier je naam in:</label>
                <input 
                    type="text" 
                    class="name-input" 
                    id="userName" 
                    placeholder="JOUW NAAM..."
                    maxlength="15"
                    oninput="updateCharCount()"
                    autocomplete="off"
                >
                <div class="char-count">
                    <span id="charCount">0</span> / 15 TEKENS
                </div>
            </div>

            <!-- Button Area -->
            <div class="button-area">
                <button 
                    class="btn-start-adventure" 
                    id="continueBtn"
                    onclick="proceedToCharacterSelection()"
                    disabled
                >
                    START AVONTUUR →
                </button>
            </div>
        </div>
    </div>

    <script>
        let playerName = '';

        function updateCharCount() {
            const input = document.getElementById('userName');
            const count = document.getElementById('charCount');
            const continueBtn = document.getElementById('continueBtn');
            
            playerName = input.value.trim();
            count.textContent = input.value.length;
            
            // Enable/disable continue button - minimum 2 characters
            if (playerName.length >= 2) {
                continueBtn.disabled = false;
            } else {
                continueBtn.disabled = true;
            }
        }

        function proceedToCharacterSelection() {
            if (playerName.length >= 2) {
                // Play confirm sound if possible
                if (typeof SoundSystem !== 'undefined') SoundSystem.playBlip(880, 0.1);
                
                // Store name in session storage
                sessionStorage.setItem('playerName', playerName);
                window.location.href = '0.3-character-selection.html';
            }
        }

        function goBack() {
            window.location.href = '../index.html';
        }

        // Allow Enter key to proceed
        document.getElementById('userName').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && playerName.length >= 2) {
                proceedToCharacterSelection();
            }
        });

        // Focus input on load
        window.onload = function() {
            document.getElementById('userName').focus();
        };
    </script>
</body>
</html>
