<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1.0 - Hub Map | Weather Lab Kids</title>
    <link rel="stylesheet" href="../design-system.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        .hub-screen {
            width: 100%; min-height: 100vh; min-height: 100dvh;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F7FA 100%);
            position: relative; overflow-x: hidden; overflow-y: auto;
            font-family: 'Outfit', sans-serif;
            padding-bottom: clamp(60px, 10vh, 100px);
        }

        .soft-cloud { position: fixed; background: rgba(255,255,255,0.5); backdrop-filter: blur(8px); border-radius: 100px; animation: float-cloud linear infinite; box-shadow: 0 10px 30px rgba(0,0,0,0.05); pointer-events: none; z-index: 5; }
        .soft-cloud::before, .soft-cloud::after { content:''; position: absolute; background: inherit; border-radius: 50%; }
        .soft-cloud::before { width: 50%; height: 100%; top: -40%; left: 15%; }
        .soft-cloud::after { width: 40%; height: 80%; top: -20%; right: 15%; }
        .cloud-1 { width: min(200px,25vw); height: min(60px,7.5vw); top: 10%; animation-duration: 45s; }
        .cloud-2 { width: min(150px,20vw); height: min(45px,5.5vw); top: 25%; animation-duration: 60s; animation-delay: -10s; }
        .cloud-3 { width: min(250px,30vw); height: min(75px,9vw); top: 80%; animation-duration: 50s; animation-delay: -25s; }
        @keyframes float-cloud { 0% { transform: translateX(-300px); } 100% { transform: translateX(calc(100vw + 300px)); } }

        .sky-star { position: absolute; color: white; font-size: clamp(12px,2vw,16px); animation: twinkle-star 2s ease-in-out infinite; pointer-events: none; z-index: 2; }
        @keyframes twinkle-star { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

        /* Top Bar */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: clamp(10px,2vw,20px) clamp(15px,3vw,40px);
            padding-top: clamp(15px,3vw,40px);
            position: relative; z-index: 50;
        }

        .player-info-bar {
            background: white; padding: clamp(8px,1vw,10px) clamp(12px,2vw,25px);
            display: flex; align-items: center; gap: clamp(8px,1.5vw,15px);
            border-radius: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .player-avatar-small { font-size: clamp(20px,4vw,32px); filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1)); }
        .player-info-text { color: #2C3E50; font-size: clamp(10px,1.3vw,12px); line-height: 1.4; }
        #playerNameSmall { font-weight: 900; text-transform: uppercase; }

        .progress-counter {
            background: #2ECC71; padding: clamp(8px,1vw,10px) clamp(15px,2.5vw,30px);
            border-radius: 25px; box-shadow: 0 10px 20px rgba(46,204,113,0.2);
            text-align: center; color: white;
        }
        .progress-text { font-size: clamp(8px,1vw,10px); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
        .progress-number { font-size: clamp(14px,2.5vw,20px); font-weight: 900; }

        /* Title Panel */
        .title-panel {
            background: rgba(255,255,255,0.4); backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.5);
            padding: clamp(12px,2vw,20px) clamp(25px,5vw,60px);
            text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            border-radius: 30px; z-index: 50; margin: 0 auto clamp(15px,3vh,30px);
            width: fit-content;
        }
        .title-main { font-size: clamp(18px,3.5vw,28px); font-weight: 900; color: #2C3E50; letter-spacing: 1px; }
        .subtitle { font-size: clamp(11px,1.5vw,14px); color: #34495E; margin-top: 5px; font-weight: 400; }

        /* Islands */
        .islands-container {
            display: flex; justify-content: center; align-items: flex-start;
            gap: clamp(20px,4vw,60px); z-index: 20;
            padding: 0 clamp(10px,3vw,30px);
            flex-wrap: wrap;
        }

        .island {
            width: clamp(180px,25vw,280px); cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
            position: relative; display: flex; flex-direction: column;
            align-items: center; animation: float-island 4s ease-in-out infinite;
        }
        .island:nth-child(1) { animation-delay: 0s; }
        .island:nth-child(2) { animation-delay: 1.3s; }
        .island:nth-child(3) { animation-delay: 2.6s; }
        @keyframes float-island { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .island:hover { transform: translateY(-30px) scale(1.05); }

        .island-visual {
            width: clamp(150px,20vw,240px); height: clamp(110px,15vw,180px);
            position: relative; border-radius: clamp(20px,4vw,40px);
            overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 4px solid white; background: white;
            display: flex; align-items: center; justify-content: center;
        }
        .island-icon { font-size: clamp(50px,10vw,100px); filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1)); transition: transform 0.3s; }
        .island:hover .island-icon { transform: scale(1.1) rotate(5deg); }

        .island-aura {
            position: absolute; top: -20px; left: -20px; right: -20px; bottom: -20px;
            border-radius: 50%; z-index: -1; filter: blur(30px); opacity: 0.4; transition: opacity 0.3s;
        }
        .island:hover .island-aura { opacity: 0.7; }
        .island-observatory .island-aura { background: #FFD966; }
        .island-storm .island-aura { background: #A569BD; }
        .island-discovery .island-aura { background: #48C9B0; }

        .island-nameplate {
            background: white; padding: clamp(10px,1.5vw,15px) clamp(15px,2vw,25px);
            margin-top: clamp(10px,2vw,20px); text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-radius: 20px;
            border: 2px solid rgba(0,0,0,0.05); width: 100%;
        }
        .island-title { font-size: clamp(12px,2vw,18px); font-weight: 900; color: #2C3E50; margin-bottom: 5px; text-transform: uppercase; }
        .island-subtitle { font-size: clamp(10px,1.3vw,12px); color: #7F8C8D; font-weight: 400; }

        .progress-badge {
            position: absolute; top: -15px; right: -15px;
            background: white; border-radius: 50%;
            width: clamp(35px,5vw,50px); height: clamp(35px,5vw,50px);
            display: flex; align-items: center; justify-content: center;
            font-size: clamp(16px,2.5vw,24px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); z-index: 30;
            border: 3px solid #F1C40F;
        }
        .progress-badge.completed { background: #2ECC71; color: white; border-color: white; }

        /* Bottom Info */
        .bottom-info {
            position: fixed; bottom: clamp(10px,2vh,40px); left: 50%; transform: translateX(-50%);
            font-size: clamp(11px,1.5vw,14px); color: #2C3E50; text-align: center;
            background: rgba(255,255,255,0.6); backdrop-filter: blur(10px);
            padding: clamp(10px,1.5vw,15px) clamp(20px,4vw,40px);
            border-radius: 30px; border: 2px solid rgba(255,255,255,0.5);
            z-index: 50; font-weight: 700; box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            white-space: nowrap;
        }

        .btn-back {
            position: fixed; bottom: clamp(10px,2vh,40px); left: clamp(15px,3vw,40px);
            background: rgba(255,255,255,0.4); backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.5); color: #2C3E50;
            padding: clamp(10px,1.5vw,15px) clamp(15px,2.5vw,30px);
            border-radius: 30px; font-weight: 700; z-index: 100;
            cursor: pointer; transition: all 0.3s; font-size: clamp(12px,1.5vw,16px);
        }
        .btn-back:hover { background: white; transform: translateX(-5px); }

        @media (max-width: 600px) {
            .islands-container { flex-direction: column; align-items: center; }
            .island { width: min(280px, 80vw); }
            .bottom-info { font-size: 11px; padding: 8px 20px; }
        }
    </style>
</head>
<body>
    <div class="screen-container hub-screen">
        <div class="soft-cloud cloud-1"></div>
        <div class="soft-cloud cloud-2"></div>
        <div class="soft-cloud cloud-3"></div>

        <div class="sky-star" style="top: 15%; left: 10%;">⭐</div>
        <div class="sky-star" style="top: 25%; left: 20%;">✨</div>
        <div class="sky-star" style="top: 18%; left: 80%;">⭐</div>
        <div class="sky-star" style="top: 30%; left: 90%;">✨</div>
        <div class="sky-star" style="top: 20%; left: 50%;">⭐</div>

        <button class="btn-back" onclick="window.location.href='0.3-character-selection.html'">← TERUG</button>

        <div class="top-bar">
            <div class="player-info-bar">
                <div class="player-avatar-small" id="playerAvatarSmall">👩‍🔬</div>
                <div class="player-info-text">
                    <div id="playerNameSmall">KAPITEIN</div>
                    <div style="font-size: 9px; opacity: 0.6;">Jonge Meteoroloog</div>
                </div>
            </div>
            <div class="progress-counter">
                <div class="progress-text">MISSIES</div>
                <div class="progress-number" id="progressDisplay">0/3</div>
            </div>
        </div>

        <div class="title-panel">
            <div class="title-main">DE WEER EILANDEN</div>
            <div class="subtitle">Kies een eiland om te ontdekken</div>
        </div>

        <div class="islands-container">
            <div class="island island-observatory" onclick="goToIsland('observatory')">
                <div class="progress-badge" id="badge-observatory">🔒</div>
                <div class="island-aura"></div>
                <div class="island-visual"><div class="island-icon">🔭</div></div>
                <div class="island-nameplate">
                    <div class="island-title">OBSERVATORIUM</div>
                    <div class="island-subtitle">Weer Meten</div>
                </div>
            </div>
            <div class="island island-storm" onclick="goToIsland('storm')">
                <div class="progress-badge" id="badge-storm">🔒</div>
                <div class="island-aura"></div>
                <div class="island-visual"><div class="island-icon">⛈️</div></div>
                <div class="island-nameplate">
                    <div class="island-title">STORM LAB</div>
                    <div class="island-subtitle">Weer Maken</div>
                </div>
            </div>
            <div class="island island-discovery" onclick="goToIsland('discovery')">
                <div class="progress-badge" id="badge-discovery">🔒</div>
                <div class="island-aura"></div>
                <div class="island-visual"><div class="island-icon">🔬</div></div>
                <div class="island-nameplate">
                    <div class="island-title">DISCOVERY LAB</div>
                    <div class="island-subtitle">Weer Leren</div>
                </div>
            </div>
        </div>

        <div class="bottom-info">Tik op een eiland om je missie te beginnen</div>
    </div>

    <script>
        const characterEmojis = { 'pam': '👩‍🔬', 'lily': '👧', 'eric': '👦' };

        window.onload = function() {
            const playerName = sessionStorage.getItem('playerName') || 'KAPITEIN';
            const selectedCharacter = sessionStorage.getItem('selectedCharacter') || 'pam';
            document.getElementById('playerNameSmall').textContent = playerName.toUpperCase();
            document.getElementById('playerAvatarSmall').textContent = characterEmojis[selectedCharacter];
            updateProgress();
        };

        function updateProgress() {
            const completed = {
                observatory: sessionStorage.getItem('completed_observatory') === 'true',
                storm: sessionStorage.getItem('completed_storm') === 'true',
                discovery: sessionStorage.getItem('completed_discovery') === 'true'
            };
            let completedCount = 0;
            if (completed.observatory) { document.getElementById('badge-observatory').textContent = '✅'; document.getElementById('badge-observatory').classList.add('completed'); completedCount++; }
            if (completed.storm) { document.getElementById('badge-storm').textContent = '✅'; document.getElementById('badge-storm').classList.add('completed'); completedCount++; }
            if (completed.discovery) { document.getElementById('badge-discovery').textContent = '✅'; document.getElementById('badge-discovery').classList.add('completed'); completedCount++; }
            document.getElementById('progressDisplay').textContent = `${completedCount}/3`;
            if (completedCount === 3) {
                const finalTestOffered = sessionStorage.getItem('final_test_offered');
                if (!finalTestOffered) {
                    setTimeout(() => {
                        if (confirm('Gefeliciteerd! Je hebt alle eilanden verkend! Ben je klaar voor de FINALE TEST?')) {
                            sessionStorage.setItem('final_test_offered', 'true');
                            window.location.href = '5.0-final-warning.html';
                        }
                    }, 500);
                }
            }
        }

        function goToIsland(island) {
            sessionStorage.setItem('destination', island);
            window.location.href = '1.5-loading.html';
        }
    </script>
</body>
</html>
