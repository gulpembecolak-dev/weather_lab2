<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1.0 - Hub Map | Weather Lab Kids</title>
    <link rel="stylesheet" href="../design-system.css">
    <script src="../js/dialogue.js"></script>
    <style>
        .hub-screen {
            width: var(--screen-width);
            height: var(--screen-height);
            background: linear-gradient(180deg, #667eea 0%, #764ba2 40%, #E8DAEF 100%);
            position: relative;
            overflow: hidden;
        }

        /* Environmental Layers */
        .fog-layer {
            position: absolute;
            top: 0; left: 0; width: 200%; height: 100%;
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0) 100%);
            animation: move-fog 20s linear infinite;
            pointer-events: none; z-index: 2;
        }

        @keyframes move-fog {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Island Paths - Connecting Lines */
        .island-paths {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        .path-line {
            position: absolute;
            background: rgba(255, 255, 255, 0.2);
            height: 8px;
            border: 2px dashed rgba(255, 255, 255, 0.4);
            transform-origin: left center;
        }

        /* Floating Islands */
        .island-container {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .island-container:hover {
            transform: scale(1.1) translateY(-10px);
        }

        .island-sprite {
            font-size: 100px;
            filter: drop-shadow(0 15px 15px rgba(0,0,0,0.3));
            animation: float-island 4s ease-in-out infinite;
        }

        @keyframes float-island {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .island-label-rich {
            margin-top: 15px;
            background: var(--wood-mid);
            border: 4px solid var(--wood-dark);
            padding: 10px 20px;
            color: var(--parchment);
            font-size: 14px;
            box-shadow: 
                inset 0 0 0 2px var(--wood-light),
                0 8px 16px rgba(0,0,0,0.3);
            border-radius: 4px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* Center Player Island */
        .center-island {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .player-avatar-hub {
            font-size: 80px;
            margin-bottom: -20px;
            z-index: 21;
        }

        .small-island {
            width: 150px; height: 40px;
            background: #27AE60;
            border: 4px solid #1E8449;
            border-radius: 50%;
            box-shadow: 0 10px 0 #145A32;
        }

        /* Progress Markers */
        .check-mark {
            position: absolute;
            top: -10px; right: -10px;
            background: #2ECC71;
            width: 40px; height: 40px;
            border-radius: 50%;
            border: 3px solid white;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            opacity: 0; transform: scale(0);
            transition: all 0.3s;
        }

        .completed .check-mark {
            opacity: 1; transform: scale(1);
        }
    </style>
</head>
<body>
    <div class="screen-container hub-screen">
        <div class="fog-layer"></div>

        <!-- Back Button -->
        <button class="btn-pixel btn-wood btn-back" onclick="window.location.href='0.3-character-selection.html'">
            ← TERUG
        </button>

        <!-- Paths -->
        <div class="island-paths">
            <!-- Observatory to Center -->
            <div class="path-line" style="width: 200px; top: 40%; left: 35%; transform: rotate(30deg);"></div>
            <!-- Storm Lab to Center -->
            <div class="path-line" style="width: 200px; top: 40%; right: 35%; transform: rotate(150deg);"></div>
            <!-- Discovery Lab to Center -->
            <div class="path-line" style="width: 150px; bottom: 35%; left: 50%; transform: translateX(-50%) rotate(90deg);"></div>
        </div>

        <!-- Center Player -->
        <div class="center-island">
            <div class="player-avatar-hub" id="playerAvatar">👩‍🔬</div>
            <div class="small-island"></div>
        </div>

        <!-- Observatory Island -->
        <div class="island-container" style="top: 20%; left: 15%;" onclick="navigateTo('2.0-observatory-main.html')" id="island-observatory">
            <div class="check-mark">✓</div>
            <div class="island-sprite">🏰</div>
            <div class="island-label-rich">OBSERVATORIUM</div>
        </div>

        <!-- Storm Lab Island -->
        <div class="island-container" style="top: 20%; right: 15%;" onclick="navigateTo('3.0-storm-main.html')" id="island-storm">
            <div class="check-mark">✓</div>
            <div class="island-sprite">⛈️</div>
            <div class="island-label-rich">STORM LAB</div>
        </div>

        <!-- Discovery Lab Island -->
        <div class="island-container" style="bottom: 15%; left: 50%; transform: translateX(-50%);" onclick="navigateTo('4.0-discovery-lab.html')" id="island-discovery">
            <div class="check-mark">✓</div>
            <div class="island-sprite">🧪</div>
            <div class="island-label-rich">ONTDEKKINGSLAB</div>
        </div>

        <!-- Final Test (Hidden until others done) -->
        <div class="island-container" id="finalTestIsland" style="bottom: 15%; right: 10%; display: none;" onclick="navigateTo('5.0-final-test.html')">
            <div class="island-sprite" style="font-size: 80px;">🏆</div>
            <div class="island-label-rich" style="background: var(--sun-yellow); color: var(--text-dark);">DE GROTE TEST</div>
        </div>
    </div>

    <script>
        window.onload = function() {
            // Set player avatar
            const character = sessionStorage.getItem('selectedCharacter') || 'pam';
            const avatars = { 'pam': '👩‍🔬', 'lily': '👧', 'eric': '👦' };
            document.getElementById('playerAvatar').textContent = avatars[character];

            // Check completion
            const obsDone = sessionStorage.getItem('completed_observatory') === 'true';
            const stormDone = sessionStorage.getItem('completed_storm') === 'true';
            const discoveryDone = sessionStorage.getItem('completed_discovery') === 'true';

            if (obsDone) document.getElementById('island-observatory').classList.add('completed');
            if (stormDone) document.getElementById('island-storm').classList.add('completed');
            if (discoveryDone) document.getElementById('island-discovery').classList.add('completed');

            // Show final test if all done
            if (obsDone && stormDone && discoveryDone) {
                document.getElementById('finalTestIsland').style.display = 'flex';
            }
        };

        function navigateTo(url) {
            sessionStorage.setItem('destination', url);
            window.location.href = '1.5-loading.html';
        }
    </script>
</body>
</html>
