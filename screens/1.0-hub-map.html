<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1.0 - Hub Map | Weather Lab Kids</title>
    <link rel="stylesheet" href="../design-system.css">
    <script src="../js/dialogue.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        .hub-screen {
            width: var(--screen-width);
            height: var(--screen-height);
            background: linear-gradient(180deg, #87CEEB 0%, #E0F7FA 100%);
            position: relative;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
        }

        /* Modern Soft Clouds */
        .soft-cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 100px;
            animation: float-cloud linear infinite;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            pointer-events: none;
            z-index: 5;
        }

        .soft-cloud::before, .soft-cloud::after {
            content: '';
            position: absolute;
            background: inherit;
            border-radius: 50%;
        }

        .soft-cloud::before { width: 50%; height: 100%; top: -40%; left: 15%; }
        .soft-cloud::after { width: 40%; height: 80%; top: -20%; right: 15%; }

        @keyframes float-cloud {
            0% { transform: translateX(-300px); }
            100% { transform: translateX(1300px); }
        }

        /* Sky Stars */
        .sky-star {
            position: absolute;
            color: white;
            font-size: 16px;
            animation: twinkle-star 2s ease-in-out infinite;
            pointer-events: none;
            z-index: 2;
        }

        @keyframes twinkle-star {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* Floating Islands Container */
        .islands-container {
            position: absolute;
            top: 220px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 60px;
            z-index: 20;
        }

        /* Island Card */
        .island {
            width: 280px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: float-island 4s ease-in-out infinite;
        }

        .island:nth-child(1) { animation-delay: 0s; }
        .island:nth-child(2) { animation-delay: 1.3s; }
        .island:nth-child(3) { animation-delay: 2.6s; }

        @keyframes float-island {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .island:hover {
            transform: translateY(-30px) scale(1.05);
        }

        /* Island Visual */
        .island-visual {
            width: 240px;
            height: 180px;
            position: relative;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 4px solid white;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .island-icon {
            font-size: 100px;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.1));
            transition: transform 0.3s;
        }

        .island:hover .island-icon {
            transform: scale(1.1) rotate(5deg);
        }

        /* Island Aura/Glow */
        .island-aura {
            position: absolute;
            top: -20px;
            left: -20px;
            right: -20px;
            bottom: -20px;
            border-radius: 50%;
            z-index: -1;
            filter: blur(30px);
            opacity: 0.4;
            transition: opacity 0.3s;
        }

        .island:hover .island-aura {
            opacity: 0.7;
        }

        /* Specific Island Styles */
        .island-observatory .island-aura { background: #FFD966; }
        .island-storm .island-aura { background: #A569BD; }
        .island-discovery .island-aura { background: #48C9B0; }

        /* Island Name Plate */
        .island-nameplate {
            background: white;
            padding: 15px 25px;
            margin-top: 20px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            border-radius: 20px;
            border: 2px solid rgba(0,0,0,0.05);
            width: 100%;
        }

        .island-title {
            font-size: 18px;
            font-weight: 900;
            color: #2C3E50;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .island-subtitle {
            font-size: 12px;
            color: #7F8C8D;
            font-weight: 400;
        }

        /* Progress Badge */
        .progress-badge {
            position: absolute;
            top: -15px;
            right: -15px;
            background: white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            z-index: 30;
            border: 3px solid #F1C40F;
        }

        .progress-badge.completed {
            background: #2ECC71;
            color: white;
            border-color: white;
            animation: badge-bounce 0.5s ease-in-out;
        }

        @keyframes badge-bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* Title Panel - Modern Glassmorphism */
        .title-panel {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            padding: 20px 60px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            border-radius: 30px;
            z-index: 50;
        }

        .title-main {
            font-size: 28px;
            font-weight: 900;
            color: #2C3E50;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 14px;
            color: #34495E;
            margin-top: 5px;
            font-weight: 400;
        }

        /* Player Info Bar */
        .player-info-bar {
            position: absolute;
            top: 40px;
            left: 40px;
            background: white;
            padding: 10px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-radius: 25px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            z-index: 50;
        }

        .player-avatar-small {
            font-size: 32px;
            filter: drop-shadow(0 5px 10px rgba(0, 0, 0, 0.1));
        }

        .player-info-text {
            color: #2C3E50;
            font-size: 12px;
            line-height: 1.4;
        }

        #playerNameSmall {
            font-weight: 900;
            text-transform: uppercase;
        }

        /* Progress Counter */
        .progress-counter {
            position: absolute;
            top: 40px;
            right: 40px;
            background: #2ECC71;
            padding: 10px 30px;
            border-radius: 25px;
            box-shadow: 0 10px 20px rgba(46, 204, 113, 0.2);
            text-align: center;
            color: white;
            z-index: 50;
        }

        .progress-text {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .progress-number {
            font-size: 20px;
            font-weight: 900;
        }

        /* Bottom Info */
        .bottom-info {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: #2C3E50;
            text-align: center;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            z-index: 50;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
        }

        /* Back Button Override */
        .btn-back {
            position: absolute;
            bottom: 40px;
            left: 40px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: #2C3E50;
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: 700;
            z-index: 100;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-back:hover {
            background: white;
            transform: translateX(-5px);
        }
    </style>
</head>
<body>
    <div class="screen-container hub-screen">
        <!-- Modern Clouds -->
        <div class="soft-cloud" style="width: 200px; height: 60px; top: 10%; left: -200px; animation-duration: 45s;"></div>
        <div class="soft-cloud" style="width: 150px; height: 45px; top: 25%; left: -150px; animation-duration: 60s; animation-delay: -10s;"></div>
        <div class="soft-cloud" style="width: 250px; height: 75px; top: 80%; left: -300px; animation-duration: 50s; animation-delay: -25s;"></div>

        <!-- Sky Stars -->
        <div class="sky-star" style="top: 15%; left: 10%;">⭐</div>
        <div class="sky-star" style="top: 25%; left: 20%;">✨</div>
        <div class="sky-star" style="top: 18%; left: 80%;">⭐</div>
        <div class="sky-star" style="top: 30%; left: 90%;">✨</div>
        <div class="sky-star" style="top: 20%; left: 50%;">⭐</div>

        <!-- Back Button -->
        <button class="btn-back" onclick="window.location.href='0.3-character-selection.html'">
            ← TERUG
        </button>

        <!-- Player Info Bar -->
        <div class="player-info-bar">
            <div class="player-avatar-small" id="playerAvatarSmall">👩‍🔬</div>
            <div class="player-info-text">
                <div id="playerNameSmall">KAPITEIN</div>
                <div style="font-size: 9px; opacity: 0.6;">Jonge Meteoroloog</div>
            </div>
        </div>

        <!-- Progress Counter -->
        <div class="progress-counter">
            <div class="progress-text">MISSIES</div>
            <div class="progress-number" id="progressDisplay">0/3</div>
        </div>

        <!-- Title Panel -->
        <div class="title-panel">
            <div class="title-main">DE WEER EILANDEN</div>
            <div class="subtitle">Kies een eiland om te ontdekken</div>
        </div>

        <!-- Islands Container -->
        <div class="islands-container">
            <!-- Island 1: Observatory (WEER) -->
            <div class="island island-observatory" onclick="goToIsland('observatory')">
                <div class="progress-badge" id="badge-observatory">🔒</div>
                <div class="island-aura"></div>
                <div class="island-visual">
                    <div class="island-icon">🔭</div>
                </div>
                <div class="island-nameplate">
                    <div class="island-title">OBSERVATORIUM</div>
                    <div class="island-subtitle">Weer Meten</div>
                </div>
            </div>

            <!-- Island 2: Storm Lab -->
            <div class="island island-storm" onclick="goToIsland('storm')">
                <div class="progress-badge" id="badge-storm">🔒</div>
                <div class="island-aura"></div>
                <div class="island-visual">
                    <div class="island-icon">⛈️</div>
                </div>
                <div class="island-nameplate">
                    <div class="island-title">STORM LAB</div>
                    <div class="island-subtitle">Weer Maken</div>
                </div>
            </div>

            <!-- Island 3: Discovery Lab -->
            <div class="island island-discovery" onclick="goToIsland('discovery')">
                <div class="progress-badge" id="badge-discovery">🔒</div>
                <div class="island-aura"></div>
                <div class="island-visual">
                    <div class="island-icon">🔬</div>
                </div>
                <div class="island-nameplate">
                    <div class="island-title">DISCOVERY LAB</div>
                    <div class="island-subtitle">Weer Leren</div>
                </div>
            </div>
        </div>

        <!-- Bottom Info -->
        <div class="bottom-info">
            Tik op een eiland om je missie te beginnen
        </div>
    </div>

    <script>
        // Character emoji mapping
        const characterEmojis = {
            'pam': '👩‍🔬',
            'lily': '👧',
            'eric': '👦'
        };

        // Load player data
        window.onload = function() {
            const playerName = sessionStorage.getItem('playerName') || 'KAPITEIN';
            const selectedCharacter = sessionStorage.getItem('selectedCharacter') || 'pam';
            
            document.getElementById('playerNameSmall').textContent = playerName.toUpperCase();
            document.getElementById('playerAvatarSmall').textContent = characterEmojis[selectedCharacter];

            // Load progress
            updateProgress();

            // Show welcome dialogue
            setTimeout(() => {
                const playerName = sessionStorage.getItem('playerName') || 'Kapitein';
                showDialogue(`Hoi ${playerName}! Welkom op de Weer Eilanden. Waar gaan we vandaag naartoe?`, 'happy');
            }, 1000);
        };

        function updateProgress() {
            const completed = {
                observatory: sessionStorage.getItem('completed_observatory') === 'true',
                storm: sessionStorage.getItem('completed_storm') === 'true',
                discovery: sessionStorage.getItem('completed_discovery') === 'true'
            };

            let completedCount = 0;

            // Update badges
            if (completed.observatory) {
                document.getElementById('badge-observatory').textContent = '✅';
                document.getElementById('badge-observatory').classList.add('completed');
                completedCount++;
            }
            if (completed.storm) {
                document.getElementById('badge-storm').textContent = '✅';
                document.getElementById('badge-storm').classList.add('completed');
                completedCount++;
            }
            if (completed.discovery) {
                document.getElementById('badge-discovery').textContent = '✅';
                document.getElementById('badge-discovery').classList.add('completed');
                completedCount++;
            }

            document.getElementById('progressDisplay').textContent = `${completedCount}/3`;

            // Check if all completed
            if (completedCount === 3) {
                // Check if final test is offered
                const finalTestOffered = sessionStorage.getItem('final_test_offered');
                if (!finalTestOffered) {
                    setTimeout(() => {
                        if (confirm('Gefeliciteerd! Je hebt alle eilanden verkend! Ben je klaar voor de FINALE TEST?')) {
                            sessionStorage.setItem('final_test_offered', 'true');
                            window.location.href = '5.0-final-warning.html';
                        }
                    }, 500);
                }
            }
        }

        function goToIsland(island) {
            // Show loading screen
            sessionStorage.setItem('destination', island);
            window.location.href = '1.5-loading.html';
        }
    </script>
</body>
</html>
