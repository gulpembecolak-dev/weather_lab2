<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3.0 - Storm Lab | Weather Lab Kids</title>
    <link rel="stylesheet" href="../design-system.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        .storm-screen { width:100%; height:100vh; height:100dvh; background:linear-gradient(135deg,#87CEEB 0%,#E0F7FA 100%); position:relative; overflow:hidden; font-family:'Outfit',sans-serif; display:flex; flex-direction:column; align-items:center; }
        .storm-title { background:rgba(255,255,255,0.4); backdrop-filter:blur(15px); border:2px solid rgba(255,255,255,0.5); padding:clamp(12px,2vw,20px) clamp(25px,5vw,60px); border-radius:30px; box-shadow:0 20px 40px rgba(0,0,0,0.05); text-align:center; font-size:clamp(18px,3.5vw,28px); font-weight:900; color:#2C3E50; z-index:100; margin-top:clamp(60px,8vh,80px); margin-bottom:clamp(10px,2vh,20px); }
        .game-area { width:min(900px,95vw); flex:1; max-height:min(480px,55vh); background:linear-gradient(180deg,#E0F7FA 0%,#B2EBF2 100%); border-radius:clamp(20px,4vw,40px); box-shadow:0 30px 60px rgba(0,0,0,0.05); border:4px solid white; position:relative; overflow:hidden; }
        .game-ground { position:absolute; bottom:0; width:100%; height:clamp(50px,10vh,100px); background:#2ECC71; box-shadow:inset 0 10px 20px rgba(0,0,0,0.05); }
        .trees-container { position:absolute; bottom:clamp(40px,8vh,80px); left:50%; transform:translateX(-50%); width:min(700px,80%); display:flex; justify-content:space-around; align-items:flex-end; z-index:5; }
        .tree-wrapper { display:flex; flex-direction:column; align-items:center; transform-origin:bottom center; transition:transform 0.2s ease-out; }
        .tree-emoji { font-size:clamp(60px,10vw,120px); filter:drop-shadow(0 10px 20px rgba(0,0,0,0.1)); }
        .cloud-storm { position:absolute; top:clamp(15px,3vh,40px); left:50%; transform:translateX(-50%); font-size:clamp(70px,12vw,140px); transition:all 0.5s cubic-bezier(0.175,0.885,0.32,1.275); z-index:10; filter:drop-shadow(0 20px 40px rgba(0,0,0,0.1)); }
        .slider-panel { position:absolute; right:clamp(10px,2vw,40px); top:50%; transform:translateY(-50%); width:clamp(80px,10vw,140px); height:min(400px,60vh); background:rgba(255,255,255,0.6); backdrop-filter:blur(10px); border:2px solid white; box-shadow:0 20px 40px rgba(0,0,0,0.05); border-radius:clamp(20px,3vw,40px); display:flex; flex-direction:column; align-items:center; padding:clamp(15px,2vw,30px) clamp(10px,1.5vw,20px); z-index:50; }
        .beaufort-number { font-size:clamp(28px,5vw,48px); font-weight:900; color:#2C3E50; margin-bottom:10px; }
        .slider-track { flex:1; width:12px; background:rgba(0,0,0,0.05); border-radius:10px; position:relative; cursor:pointer; margin:clamp(10px,2vw,20px) 0; }
        .slider-handle { position:absolute; left:50%; transform:translate(-50%,50%); width:clamp(35px,5vw,60px); height:clamp(35px,5vw,60px); background:white; border:4px solid #FFD966; border-radius:50%; box-shadow:0 10px 20px rgba(255,217,102,0.3); bottom:0; cursor:pointer; transition:transform 0.2s; }
        .slider-handle:hover { transform:translate(-50%,50%) scale(1.1); }
        .beaufort-label { position:absolute; bottom:clamp(10px,2vh,30px); left:50%; transform:translateX(-50%); font-size:clamp(14px,2.5vw,24px); font-weight:900; color:#2C3E50; background:white; padding:clamp(8px,1.2vw,15px) clamp(15px,3vw,40px); border-radius:30px; box-shadow:0 10px 20px rgba(0,0,0,0.05); border:2px solid rgba(0,0,0,0.05); z-index:60; text-transform:uppercase; letter-spacing:1px; white-space:nowrap; }
        .lightning-flash { position:absolute; top:0; left:0; width:100%; height:100%; background:white; opacity:0; pointer-events:none; z-index:1000; }
        @keyframes flash { 0%{opacity:0;} 10%{opacity:0.8;} 20%{opacity:0;} 30%{opacity:0.5;} 40%{opacity:0;} }
        .wind-line { position:absolute; height:3px; background:rgba(255,255,255,0.6); border-radius:2px; animation:blow linear infinite; z-index:8; }
        @keyframes blow { 0%{transform:translateX(-100px);opacity:0;} 50%{transform:translateX(450px);opacity:0.8;} 100%{transform:translateX(1000px);opacity:0;} }
        .btn-back { position:fixed; top:clamp(15px,3vw,40px); left:clamp(15px,3vw,40px); background:rgba(255,255,255,0.4); backdrop-filter:blur(10px); border:2px solid rgba(255,255,255,0.5); color:#2C3E50; padding:clamp(10px,1.5vw,15px) clamp(15px,2.5vw,30px); border-radius:30px; font-weight:700; z-index:100; cursor:pointer; transition:all 0.3s; font-size:clamp(12px,1.5vw,16px); }
        .btn-back:hover { background:white; transform:translateX(-5px); }
        .btn-complete { background:#2ECC71; color:white; padding:clamp(12px,2vw,20px) clamp(25px,5vw,50px); border-radius:40px; font-family:'Outfit',sans-serif; font-weight:900; font-size:clamp(14px,2vw,18px); border:none; cursor:pointer; box-shadow:0 15px 30px rgba(46,204,113,0.3); transition:all 0.3s; text-transform:uppercase; letter-spacing:1px; }
        .btn-complete:hover { transform:scale(1.05) translateY(-5px); background:#27AE60; }
        .nav-bottom { position:fixed; bottom:clamp(15px,3vw,40px); left:50%; transform:translateX(-50%); z-index:100; }
    </style>
</head>
<body>
    <div class="screen-container storm-screen">
        <div class="lightning-flash" id="lightning"></div>
        <button class="btn-back" onclick="goBackToHub()">← EILANDEN</button>
        <div class="storm-title">STORM LAB</div>
        <div class="game-area" id="gameArea">
            <div class="cloud-storm" id="stormCloud">🌤️</div>
            <div class="trees-container" id="treesContainer">
                <div class="tree-wrapper"><span class="tree-emoji">🌲</span></div>
                <div class="tree-wrapper"><span class="tree-emoji">🌳</span></div>
                <div class="tree-wrapper"><span class="tree-emoji">🌲</span></div>
            </div>
            <div class="game-ground"></div>
            <div class="slider-panel">
                <div class="beaufort-number" id="windLevel">0</div>
                <div class="slider-track" id="sliderTrack"><div class="slider-handle" id="sliderHandle"></div></div>
                <div style="font-size:clamp(9px,1.2vw,12px);font-weight:900;color:#7F8C8D;letter-spacing:1px;">BEAUFORT</div>
            </div>
            <div class="beaufort-label" id="beaufortLabel">WINDSTIL</div>
        </div>
        <div class="nav-bottom"><button class="btn-complete" onclick="completeAndReturn()">MISSIE VOLTOOID</button></div>
    </div>
    <script>
        const handle=document.getElementById('sliderHandle'),track=document.getElementById('sliderTrack'),cloud=document.getElementById('stormCloud'),treeWrappers=document.querySelectorAll('.tree-wrapper'),windLevel=document.getElementById('windLevel'),beaufortLabel=document.getElementById('beaufortLabel'),lightning=document.getElementById('lightning'),gameArea=document.getElementById('gameArea');
        const beaufortScale=['WINDSTIL','ZWAKKE WIND','MATIGE WIND','VRIJ KRACHTIG','KRACHTIG','HARDE WIND','STORM','ORKAAN 🌪️'];
        let isDragging=false,currentLevel=0,windLines=[];
        function updateWindLines(level){windLines.forEach(l=>l.remove());windLines=[];if(level===0)return;const count=level*5;for(let i=0;i<count;i++){const line=document.createElement('div');line.className='wind-line';line.style.width=(Math.random()*50+20)+'px';line.style.top=Math.random()*100+'%';line.style.left='-100px';line.style.animationDuration=(2/level)+(Math.random()*0.5)+'s';line.style.animationDelay=Math.random()*2+'s';gameArea.appendChild(line);windLines.push(line);}}
        function updateSlider(e){const rect=track.getBoundingClientRect();let y=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;y=Math.max(0,Math.min(y,rect.height));const percentage=100-(y/rect.height)*100;handle.style.bottom=percentage+'%';const newLevel=Math.min(7,Math.floor(percentage/12.5));if(newLevel!==currentLevel){currentLevel=newLevel;windLevel.textContent=currentLevel;beaufortLabel.textContent=beaufortScale[currentLevel];treeWrappers.forEach(w=>{const angle=currentLevel*8;const scaleY=1-(currentLevel*0.05);w.style.transform=`rotate(${angle}deg) scaleY(${scaleY})`;});if(currentLevel>=6){cloud.textContent='⛈️';cloud.style.filter='drop-shadow(0 0 20px yellow)';triggerLightning();}else if(currentLevel>=3){cloud.textContent='☁️';cloud.style.filter='none';}else{cloud.textContent='🌤️';}updateWindLines(currentLevel);}}
        function triggerLightning(){if(currentLevel>=6){lightning.style.animation='none';void lightning.offsetWidth;lightning.style.animation='flash 0.5s';setTimeout(triggerLightning,3000+Math.random()*5000);}}
        track.addEventListener('mousedown',e=>{isDragging=true;updateSlider(e);});
        track.addEventListener('touchstart',e=>{isDragging=true;updateSlider(e);},{passive:true});
        document.addEventListener('mousemove',e=>{if(isDragging)updateSlider(e);});
        document.addEventListener('touchmove',e=>{if(isDragging)updateSlider(e);},{passive:true});
        document.addEventListener('mouseup',()=>{isDragging=false;});
        document.addEventListener('touchend',()=>{isDragging=false;});
        function completeAndReturn(){sessionStorage.setItem('completed_storm','true');goBackToHub();}
        function goBackToHub(){sessionStorage.setItem('destination','hub');window.location.href='1.5-loading.html';}
    </script>
</body>
</html>
