<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3.0 - Storm Lab | Weather Lab Kids</title>
    <link rel="stylesheet" href="../design-system.css">
    <script src="../js/dialogue.js"></script>
    <script src="../js/analytics.js"></script>
    <script>window.SCREEN_NAME = 'Storm Lab';</script>
    <style>
        .storm-screen {
            width: var(--screen-width);
            height: var(--screen-height);
            background: #2C1B3D; /* Dark purple */
            position: relative;
            overflow: hidden;
        }

        /* Room Construction */
        .lab-floor {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 200px;
            background: #1A0F26;
            border-top: 6px solid #4A235A;
            z-index: 5;
        }

        .lab-wall {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #3D2352 0%, #1A0F26 100%);
            box-shadow: inset 0 0 150px rgba(0,0,0,0.8);
        }

        /* High-Tech Props */
        .tesla-coil {
            position: absolute;
            bottom: 180px;
            width: 80px; height: 150px;
            background: #5D6D7E;
            border: 4px solid var(--wood-dark);
            z-index: 6;
        }

        .tesla-coil::after {
            content: '';
            position: absolute;
            top: -20px; left: 50%; transform: translateX(-50%);
            width: 60px; height: 60px;
            background: #AED6F1;
            border: 4px solid white;
            border-radius: 50%;
            box-shadow: 0 0 20px #5DADE2;
        }

        /* Control Panel */
        .control-panel-rich {
            position: absolute;
            bottom: 40px; right: 50px;
            width: 350px; height: 120px;
            background: #34495E;
            border: 6px solid var(--wood-dark);
            box-shadow: 
                inset 0 0 0 4px #5D6D7E,
                0 10px 20px rgba(0,0,0,0.5);
            z-index: 10;
            display: flex; gap: 10px; padding: 15px;
            align-items: center; justify-content: space-around;
        }

        .panel-btn {
            width: 40px; height: 40px;
            background: #E74C3C;
            border: 3px solid #C0392B;
            box-shadow: 0 4px 0 #922B21;
            border-radius: 4px;
        }

        /* Main Game Area (Central Screen) */
        .simulation-screen {
            position: absolute;
            top: 100px; left: 50%;
            transform: translateX(-50%);
            width: 750px; height: 420px;
            background: #000;
            border: 15px solid var(--wood-dark);
            box-shadow: 
                inset 0 0 0 4px var(--wood-light),
                0 20px 50px rgba(0,0,0,0.6);
            z-index: 15;
            overflow: hidden;
            position: relative;
        }

        .sim-background {
            width: 100%; height: 100%;
            background: linear-gradient(180deg, #2C3E50 0%, #34495E 100%);
            position: relative;
        }

        /* Beaufort Slider in Lab Style */
        .lab-slider-container {
            position: absolute;
            left: 40px; top: 150px;
            width: 120px; height: 400px;
            background: var(--parchment);
            border: 6px solid var(--wood-dark);
            padding: 20px;
            z-index: 20;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        /* Mission UI */
        .lab-mission-badge {
            position: absolute;
            top: 30px; left: 50%; transform: translateX(-50%);
            background: #8E44AD;
            border: 4px solid white;
            padding: 10px 40px;
            border-radius: 40px;
            color: white;
            z-index: 100;
            font-size: 14px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>
    <div class="screen-container storm-screen">
        <div class="lab-wall"></div>
        <div class="lab-floor"></div>
        <div class="lightning-flash" id="lightning"></div>

        <!-- Back Button -->
        <button class="btn-pixel btn-wood btn-back" onclick="goBackToHub()">
            ← EILANDEN
        </button>

        <div class="lab-mission-badge">
            MISSIE: Maak een Storm
        </div>

        <!-- Lab Props -->
        <div class="tesla-coil" style="left: 100px;"></div>
        <div class="tesla-coil" style="right: 100px;"></div>

        <!-- Control Panel -->
        <div class="control-panel-rich">
            <div class="panel-btn" style="background: #E74C3C;"></div>
            <div class="panel-btn" style="background: #2ECC71;"></div>
            <div class="panel-btn" style="background: #3498DB;"></div>
            <div style="flex:1; background: #2C3E50; height: 60px; border: 3px solid #1A252F; color: #00FF00; font-size: 8px; padding: 5px; overflow: hidden;">
                STATUS: READY<br>VOLTAGE: 100%<br>WIND: ACTIVE
            </div>
        </div>

        <!-- Simulation Screen -->
        <div class="simulation-screen">
            <div class="sim-background" id="gameArea">
                <div class="cloud-storm" id="stormCloud">☁️</div>
                
                <div class="trees-container" id="treesContainer">
                    <div class="tree-wrapper"><span class="tree-emoji">🌲</span></div>
                    <div class="tree-wrapper"><span class="tree-emoji">🌳</span></div>
                    <div class="tree-wrapper"><span class="tree-emoji">🌲</span></div>
                </div>

                <div class="game-ground"></div>
                <div class="beaufort-label" id="beaufortLabel">WINDSTIL</div>
            </div>
        </div>

        <!-- Slider moved to a lab-style panel -->
        <div class="lab-slider-container">
            <div style="font-size: 10px; color: var(--text-dark); margin-bottom: 15px;">WIND KRACHT</div>
            <div class="beaufort-number" id="windLevel" style="margin-bottom: 20px;">0</div>
            <div class="slider-track" id="sliderTrack" style="height: 250px;">
                <div class="slider-handle" id="sliderHandle"></div>
            </div>
        </div>
        
        <div style="position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 100;">
            <button class="btn-pixel btn-glow" onclick="completeAndReturn()">
                ✅ MISSIE VOLTOOID
            </button>
        </div>
    </div>

    <script>
        const handle = document.getElementById('sliderHandle');
        const track = document.getElementById('sliderTrack');
        const cloud = document.getElementById('stormCloud');
        const treeWrappers = document.querySelectorAll('.tree-wrapper');
        const windLevel = document.getElementById('windLevel');
        const beaufortLabel = document.getElementById('beaufortLabel');
        const lightning = document.getElementById('lightning');
        const gameArea = document.getElementById('gameArea');
        
        const beaufortScale = [
            'WINDSTIL', 'ZWAKKE WIND', 'MATIGE WIND', 'VRIJ KRACHTIG',
            'KRACHTIG', 'HARDE WIND', 'STORM', 'ORKAAN 🌪️'
        ];
        
        let isDragging = false;
        let currentLevel = 0;
        let windLines = [];

        function updateWindLines(level) {
            // Remove old lines
            windLines.forEach(line => line.remove());
            windLines = [];

            if (level === 0) return;

            // Create new lines based on wind level
            const count = level * 5;
            for (let i = 0; i < count; i++) {
                const line = document.createElement('div');
                line.className = 'wind-line';
                line.style.width = (Math.random() * 50 + 20) + 'px';
                line.style.top = Math.random() * 100 + '%';
                line.style.left = '-100px';
                line.style.animationDuration = (2 / level) + (Math.random() * 0.5) + 's';
                line.style.animationDelay = Math.random() * 2 + 's';
                gameArea.appendChild(line);
                windLines.push(line);
            }
        }

        function updateSlider(e) {
            const rect = track.getBoundingClientRect();
            let y = e.clientY - rect.top;
            y = Math.max(0, Math.min(y, rect.height));
            
            const percentage = 100 - (y / rect.height) * 100;
            handle.style.bottom = percentage + '%';
            
            const newLevel = Math.min(7, Math.floor(percentage / 12.5));
            if (newLevel !== currentLevel) {
                currentLevel = newLevel;
                windLevel.textContent = currentLevel;
                beaufortLabel.textContent = beaufortScale[currentLevel];
                
                // Update trees
                treeWrappers.forEach((wrapper, i) => {
                    const angle = currentLevel * 8;
                    const scaleY = 1 - (currentLevel * 0.05);
                    wrapper.style.transform = `rotate(${angle}deg) scaleY(${scaleY})`;
                });
                
                // Update clouds
                if (currentLevel >= 6) {
                    cloud.textContent = '⛈️';
                    cloud.style.filter = 'drop-shadow(0 0 20px yellow)';
                    triggerLightning();
                } else if (currentLevel >= 3) {
                    cloud.textContent = '☁️';
                    cloud.style.filter = 'none';
                } else {
                    cloud.textContent = '🌤️';
                }

                updateWindLines(currentLevel);

                // Pam's dialogue for high wind
                if (currentLevel === 7) {
                    showDialogue("PAS OP! Windkracht 7 is een echte storm! Zie je hoe de bomen buigen?", "surprised");
                }
            }
        }

        function triggerLightning() {
            if (currentLevel >= 6) {
                lightning.style.animation = 'none';
                void lightning.offsetWidth; // trigger reflow
                lightning.style.animation = 'flash 0.5s';
                
                // Random next strike
                setTimeout(triggerLightning, 3000 + Math.random() * 5000);
            }
        }

        track.addEventListener('mousedown', (e) => {
            isDragging = true;
            updateSlider(e);
        });

        document.addEventListener('mousemove', (e) => {
            if (isDragging) updateSlider(e);
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        function completeAndReturn() {
            sessionStorage.setItem('completed_storm', 'true');
            goBackToHub();
        }

        function goBackToHub() {
            sessionStorage.setItem('destination', 'hub');
            window.location.href = '1.5-loading.html';
        }

        window.onload = function() {
            setTimeout(() => {
                showDialogue("Welkom in het Storm Lab! Sleep de schuifregelaar om de windkracht te veranderen.", "happy");
            }, 500);
        };
    </script>
</body>
</html>
