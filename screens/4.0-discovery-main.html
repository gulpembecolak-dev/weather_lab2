<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>4.0 - Discovery Lab | Weather Lab Kids</title>
    <link rel="stylesheet" href="../design-system.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        .discovery-screen {
            width: var(--screen-width);
            height: var(--screen-height);
            background: linear-gradient(135deg, var(--sky-blue) 0%, var(--sky-light) 100%);
            position: relative;
            overflow: hidden;
            font-family: var(--font-modern);
        }

        /* Modern Title Panel - Glassmorphism */
        .lab-title {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            padding: 20px 60px;
            border-radius: 30px;
            box-shadow: 0 20px 40px var(--shadow-soft);
            text-align: center;
            font-size: 28px;
            font-weight: 900;
            color: var(--text-dark);
            z-index: 100;
        }

        .bubbles-container {
            position: absolute;
            top: 180px;
            left: 50%;
            transform: translateX(-50%);
            width: 1000px;
            height: 450px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 40px;
            z-index: 20;
        }

        /* Modern Question Bubble */
        .question-bubble {
            width: 220px;
            height: 220px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border: 4px solid white;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 30px var(--shadow-soft);
            animation: float-bubble 4s ease-in-out infinite;
        }

        .question-bubble:hover {
            transform: scale(1.1) translateY(-10px);
            background: white;
            box-shadow: 0 20px 40px var(--shadow-heavy);
        }

        .question-bubble:nth-child(1) { animation-delay: 0s; }
        .question-bubble:nth-child(2) { animation-delay: 0.8s; }
        .question-bubble:nth-child(3) { animation-delay: 1.6s; }
        .question-bubble:nth-child(4) { animation-delay: 2.4s; }
        .question-bubble:nth-child(5) { animation-delay: 3.2s; }

        @keyframes float-bubble {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .bubble-icon {
            font-size: 70px;
            margin-bottom: 10px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));
        }

        .bubble-text {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-dark);
            text-align: center;
            line-height: 1.3;
            padding: 0 20px;
        }

        /* Navigation Buttons */
        .btn-back {
            position: absolute;
            top: 40px;
            left: 40px;
            z-index: 100;
        }

        .btn-complete {
            min-width: 500px;
            padding: 30px 60px;
            font-size: 26px;
        }
    </style>
</head>
<body>
    <div class="screen-container discovery-screen">
        <button class="btn-modern btn-secondary btn-back" onclick="goBackToHub()">← TERUG</button>
        <div class="lab-title">DISCOVERY LAB</div>
        
        <div class="bubbles-container">
            <div class="question-bubble" onclick="showAnswer(1)">
                <div class="bubble-icon">☁️</div>
                <div class="bubble-text">Hoe ontstaan<br>wolken?</div>
            </div>
            
            <div class="question-bubble" onclick="showAnswer(2)">
                <div class="bubble-icon">💨</div>
                <div class="bubble-text">Waarom<br>waait het?</div>
            </div>
            
            <div class="question-bubble" onclick="showAnswer(3)">
                <div class="bubble-icon">🌧️</div>
                <div class="bubble-text">Hoe ontstaat<br>regen?</div>
            </div>
            
            <div class="question-bubble" onclick="showAnswer(4)">
                <div class="bubble-icon">⚡</div>
                <div class="bubble-text">Wat is<br>onweer?</div>
            </div>
            
            <div class="question-bubble" style="background: rgba(255, 217, 102, 0.4); border-color: var(--sun-yellow);" onclick="window.location.href='4.2-phygital.html'">
                <div class="bubble-icon">🏠</div>
                <div class="bubble-text">Maak je eigen<br>windmeter!</div>
            </div>
        </div>
        
        <div style="position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); z-index: 100;">
            <button class="btn-modern btn-success btn-complete" onclick="completeAndReturn()">
                MISSIE VOLTOOID
            </button>
        </div>
    </div>

    <script>
        const answers = {
            1: "☁️ WOLKEN ONTSTAAN ZO:\n\nWarm water verdampt en stijgt omhoog.\nHoog in de lucht wordt het koud.\nDe waterdamp verandert in druppeltjes.\n\nDit noemen we een WOLK!\n\nTip: Blaas op een koude dag uit je mond.\nJe ziet een mini-wolkje! 💨",
            2: "💨 WIND WERKT ZO:\n\nDe zon verwarmt de aarde.\nWarme lucht stijgt op.\nKoude lucht komt ervoor terug.\n\nDit noemen we WIND!\n\nOnthoud: Wind waait altijd van HOGE naar LAGE druk! ➡️",
            3: "🌧️ REGEN ONTSTAAT ZO:\n\nDruppeltjes in de wolk worden groter.\nZe worden te zwaar om te zweven.\nDan vallen ze naar beneden.\n\nDat noemen we REGEN!\n\n1 regenwolk kan 500.000 liter water bevatten! 💧",
            4: "⚡ ONWEER IS ZO:\n\nIn een onweerswolk botsen ijskristallen.\nDit maakt elektriciteit (zoals een batterij!).\nDe elektriciteit ontlaadt: BLIKSEM! ⚡\n\nDe lucht wordt heel heet en klapt uit elkaar.\nDat hoor je als DONDER! 💥\n\nLicht gaat sneller dan geluid!"
        };
        
        function showAnswer(num) {
            alert(answers[num]);
        }
        
        function completeAndReturn() {
            sessionStorage.setItem('completed_discovery', 'true');
            goBackToHub();
        }
        
        function goBackToHub() {
            sessionStorage.setItem('destination', 'hub');
            window.location.href = '1.5-loading.html';
        }
    </script>
</body>
</html>
