<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4.0 - Discovery Lab | Weather Lab Kids</title>
    <link rel="stylesheet" href="../design-system.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        .discovery-screen { width:100%; min-height:100vh; min-height:100dvh; background:linear-gradient(135deg,var(--sky-blue) 0%,var(--sky-light) 100%); position:relative; overflow-x:hidden; overflow-y:auto; font-family:var(--font-modern); padding-bottom:clamp(80px,12vh,120px); }
        .lab-title { background:rgba(255,255,255,0.4); backdrop-filter:blur(15px); border:2px solid rgba(255,255,255,0.5); padding:clamp(12px,2vw,20px) clamp(25px,5vw,60px); border-radius:30px; box-shadow:0 20px 40px var(--shadow-soft); text-align:center; font-size:clamp(18px,3.5vw,28px); font-weight:900; color:var(--text-dark); z-index:100; margin:clamp(60px,8vh,80px) auto clamp(15px,3vh,30px); width:fit-content; }
        .bubbles-container { width:min(1000px,95vw); margin:0 auto; display:flex; flex-wrap:wrap; justify-content:center; align-items:center; gap:clamp(15px,3vw,40px); z-index:20; padding:0 clamp(10px,2vw,20px); }
        .question-bubble { width:clamp(140px,20vw,220px); height:clamp(140px,20vw,220px); background:rgba(255,255,255,0.6); backdrop-filter:blur(10px); border:4px solid white; border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; transition:all 0.4s cubic-bezier(0.175,0.885,0.32,1.275); box-shadow:0 15px 30px var(--shadow-soft); animation:float-bubble 4s ease-in-out infinite; }
        .question-bubble:hover { transform:scale(1.1) translateY(-10px); background:white; box-shadow:0 20px 40px var(--shadow-heavy); }
        .question-bubble:nth-child(1){animation-delay:0s;} .question-bubble:nth-child(2){animation-delay:0.8s;} .question-bubble:nth-child(3){animation-delay:1.6s;} .question-bubble:nth-child(4){animation-delay:2.4s;} .question-bubble:nth-child(5){animation-delay:3.2s;}
        @keyframes float-bubble { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-20px);} }
        .bubble-icon { font-size:clamp(36px,7vw,70px); margin-bottom:10px; filter:drop-shadow(0 10px 20px rgba(0,0,0,0.1)); }
        .bubble-text { font-size:clamp(11px,1.5vw,16px); font-weight:700; color:var(--text-dark); text-align:center; line-height:1.3; padding:0 clamp(10px,1.5vw,20px); }
        .btn-back { position:fixed; top:clamp(15px,3vw,40px); left:clamp(15px,3vw,40px); z-index:100; }
        .btn-complete { min-width:min(500px,85vw); padding:clamp(18px,3vw,30px) clamp(30px,5vw,60px); font-size:clamp(18px,3vw,26px); }
        .nav-bottom { position:fixed; bottom:clamp(15px,3vw,50px); left:50%; transform:translateX(-50%); z-index:100; }
    </style>
</head>
<body>
    <div class="screen-container discovery-screen">
        <button class="btn-modern btn-secondary btn-back" onclick="goBackToHub()">← TERUG</button>
        <div class="lab-title">DISCOVERY LAB</div>
        <div class="bubbles-container">
            <div class="question-bubble" onclick="showAnswer(1)"><div class="bubble-icon">☁️</div><div class="bubble-text">Hoe ontstaan<br>wolken?</div></div>
            <div class="question-bubble" onclick="showAnswer(2)"><div class="bubble-icon">💨</div><div class="bubble-text">Waarom<br>waait het?</div></div>
            <div class="question-bubble" onclick="showAnswer(3)"><div class="bubble-icon">🌧️</div><div class="bubble-text">Hoe ontstaat<br>regen?</div></div>
            <div class="question-bubble" onclick="showAnswer(4)"><div class="bubble-icon">⚡</div><div class="bubble-text">Wat is<br>onweer?</div></div>
            <div class="question-bubble" style="background:rgba(255,217,102,0.4);border-color:var(--sun-yellow);" onclick="window.location.href='4.2-phygital.html'"><div class="bubble-icon">🏠</div><div class="bubble-text">Maak je eigen<br>windmeter!</div></div>
        </div>
        <div class="nav-bottom"><button class="btn-modern btn-success btn-complete" onclick="completeAndReturn()">MISSIE VOLTOOID</button></div>
    </div>
    <script>
        const answers={1:"☁️ WOLKEN ONTSTAAN ZO:\n\nWarm water verdampt en stijgt omhoog.\nHoog in de lucht wordt het koud.\nDe waterdamp verandert in druppeltjes.\n\nDit noemen we een WOLK!\n\nTip: Blaas op een koude dag uit je mond.\nJe ziet een mini-wolkje! 💨",2:"💨 WIND WERKT ZO:\n\nDe zon verwarmt de aarde.\nWarme lucht stijgt op.\nKoude lucht komt ervoor terug.\n\nDit noemen we WIND!\n\nOnthoud: Wind waait altijd van HOGE naar LAGE druk! ➡️",3:"🌧️ REGEN ONTSTAAT ZO:\n\nDruppeltjes in de wolk worden groter.\nZe worden te zwaar om te zweven.\nDan vallen ze naar beneden.\n\nDat noemen we REGEN!\n\n1 regenwolk kan 500.000 liter water bevatten! 💧",4:"⚡ ONWEER IS ZO:\n\nIn een onweerswolk botsen ijskristallen.\nDit maakt elektriciteit (zoals een batterij!).\nDe elektriciteit ontlaadt: BLIKSEM! ⚡\n\nDe lucht wordt heel heet en klapt uit elkaar.\nDat hoor je als DONDER! 💥\n\nLicht gaat sneller dan geluid!"};
        function showAnswer(num){alert(answers[num]);}
        function completeAndReturn(){sessionStorage.setItem('completed_discovery','true');goBackToHub();}
        function goBackToHub(){sessionStorage.setItem('destination','hub');window.location.href='1.5-loading.html';}
    </script>
</body>
</html>
