<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4.0 - Ontdekkingslab | Weather Lab Kids</title>
    <link rel="stylesheet" href="../design-system.css">
    <script src="../js/dialogue.js"></script>
    <script src="../js/analytics.js"></script>
    <script>window.SCREEN_NAME = 'Discovery Lab';</script>
    <style>
        .discovery-screen {
            width: var(--screen-width);
            height: var(--screen-height);
            background: #D5F5E3; /* Soft green */
            position: relative;
            overflow: hidden;
        }

        /* Room Construction */
        .lab-floor {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 180px;
            background: #27AE60;
            border-top: 8px solid #1E8449;
            z-index: 5;
        }

        .lab-wall {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #A9DFBF 0%, #D5F5E3 100%);
            box-shadow: inset 0 0 100px rgba(0,0,0,0.1);
        }

        /* Posters on the Wall */
        .poster {
            position: absolute;
            background: var(--parchment);
            border: 6px solid var(--wood-dark);
            padding: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.3s;
            display: flex; flex-direction: column; align-items: center;
        }

        .poster:hover { transform: scale(1.1) rotate(2deg); }

        .poster-icon { font-size: 60px; margin-bottom: 10px; }
        .poster-title { font-size: 10px; color: var(--text-dark); text-align: center; }

        /* Pam in the center */
        .pam-center {
            position: absolute;
            bottom: 150px; left: 50%;
            transform: translateX(-50%);
            font-size: 180px;
            z-index: 10;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
        }

        /* Learning Bubbles */
        .topic-bubble {
            position: absolute;
            background: white;
            border: 4px solid var(--wood-dark);
            padding: 15px 25px;
            border-radius: 30px;
            font-size: 12px;
            color: var(--text-dark);
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
            transition: all 0.3s;
            z-index: 15;
            animation: float-bubble 4s ease-in-out infinite;
        }

        .topic-bubble:hover {
            background: var(--sun-yellow);
            transform: scale(1.1);
        }

        @keyframes float-bubble {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Shelves with Lab items */
        .shelf {
            position: absolute;
            background: var(--wood-mid);
            height: 12px; border: 3px solid var(--wood-dark);
            box-shadow: 0 5px 0 rgba(0,0,0,0.2);
        }

        .lab-prop { position: absolute; font-size: 40px; z-index: 6; }

    </style>
</head>
<body>
    <div class="screen-container discovery-screen">
        <div class="lab-wall"></div>
        <div class="lab-floor"></div>

        <!-- Back Button -->
        <button class="btn-pixel btn-wood btn-back" onclick="window.location.href='1.0-hub-map.html'">
            ← EILANDEN
        </button>

        <!-- Posters -->
        <div class="poster" style="top: 80px; left: 60px;" onclick="showDialogue('Dit is de Watercyclus! Water verdampt en wordt regen.', 'happy')">
            <div class="poster-icon">🌊</div>
            <div class="poster-title">WATERCYCLUS</div>
        </div>

        <div class="poster" style="top: 50px; right: 80px;" onclick="showDialogue('Witte wolken weerkaatsen zonlicht. Donkere wolken zitten vol water!', 'surprised')">
            <div class="poster-icon">☁️</div>
            <div class="poster-title">WOLKEN TYPE</div>
        </div>

        <!-- Shelves & Props -->
        <div class="shelf" style="bottom: 300px; left: 100px; width: 150px;"></div>
        <div class="lab-prop" style="bottom: 310px; left: 120px;">🧪</div>
        <div class="lab-prop" style="bottom: 310px; left: 180px;">🧬</div>

        <div class="shelf" style="bottom: 350px; right: 120px; width: 180px;"></div>
        <div class="lab-prop" style="bottom: 360px; right: 140px;">🏺</div>
        <div class="lab-prop" style="bottom: 360px; right: 200px;">🔬</div>

        <!-- Pam -->
        <div class="pam-center">👩‍🔬</div>

        <!-- Learning Bubbles -->
        <div class="topic-bubble" style="top: 300px; left: 20%;" onclick="showDialogue('Waarom is de lucht blauw? Door de manier waarop zonlicht door de lucht gaat!', 'happy')">
            Waarom is de lucht blauw?
        </div>

        <div class="topic-bubble" style="top: 250px; right: 20%; animation-delay: 1s;" onclick="showDialogue('Hoe ontstaat regen? Wanneer waterdamp in de lucht afkoelt en druppels vormt!', 'happy')">
            Hoe ontstaat regen?
        </div>

        <div class="topic-bubble" style="bottom: 220px; left: 30%; animation-delay: 2s;" onclick="showDialogue('Wat is een regenboog? Licht dat breekt in waterdruppels!', 'happy')">
            Wat is een regenboog?
        </div>

        <!-- Mission Complete Button -->
        <div style="position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 100;">
            <button class="btn-pixel btn-glow" onclick="completeAndReturn()">
                ✅ MISSIE VOLTOOID
            </button>
        </div>
    </div>

    <script>
        function completeAndReturn() {
            sessionStorage.setItem('completed_discovery', 'true');
            sessionStorage.setItem('destination', 'hub');
            window.location.href = '1.5-loading.html';
        }

        window.onload = function() {
            setTimeout(() => {
                showDialogue("Welkom in het Ontdekkingslab! Klik op de posters of vragen om meer te leren over het weer.", "happy");
            }, 1000);
        };
    </script>
</body>
</html>
